<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아이콘 변환기</title>
</head>
<body style="text-align:center; padding-top:50px; font-family:sans-serif; background:#f0f0f0;">
    <h2>🎨 RyanL 꽉 찬 아이콘 생성기</h2>
    <p>새 로고의 테두리가 화면에 꽉 차게 맞춰집니다!</p>
    
    <canvas id="myCanvas" width="512" height="512" style="width: 300px; max-width: 100%; border-radius: 50%; box-shadow: 0 4px 10px rgba(0,0,0,0.2); background: transparent;"></canvas>
    
    <br><br>
    
    <button onclick="downloadIcon()" style="padding:15px 30px; font-size:20px; background:#ff8c00; color:white; font-weight:900; border:none; border-radius:10px; cursor:pointer;">
        📥 icon.png 다운로드
    </button>

    <script>
        var canvas = document.getElementById('myCanvas');
        var ctx = canvas.getContext('2d');
        var img = new Image();
        img.crossOrigin = "Anonymous";
        
        // 🔥 기사님 말씀대로 원본을 'icon.jpg'로 정확히 수정했습니다! 🔥
        img.src = "icon.jpg"; 

        img.onload = function() {
            // 1. 바탕 투명하게 초기화
            ctx.clearRect(0, 0, 512, 512);
            
            // 2. 완벽한 동그라미로 자르기 (마스크 씌우기)
            ctx.save();
            ctx.beginPath();
            ctx.arc(256, 256, 256, 0, 2 * Math.PI);
            ctx.clip();

            // 3. 기사님이 주신 사진의 '검정 테두리'가 화면 끝에 꽉 닿도록 살짝 확대해서 그리기!
            // (바깥쪽 쓸데없는 흰색 여백은 화면 밖으로 밀어냅니다)
            ctx.drawImage(img, -15, -15, 542, 542); 
            ctx.restore();
        };

        function downloadIcon() {
            var link = document.createElement('a');
            link.download = 'icon.png'; 
            link.href = canvas.toDataURL("image/png");
            link.click();
        }
    </script>
</body>
</html>
