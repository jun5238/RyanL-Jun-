<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아이콘 변환기</title>
</head>
<body style="text-align:center; padding-top:50px; font-family:sans-serif; background:#f0f0f0;">
    <h2>🎨 RyanL 꽉 찬 아이콘 생성기</h2>
    <p>빈틈 없이 꽉 찬 JPG 아이콘입니다!</p>
    
    <canvas id="myCanvas" width="512" height="512" style="width: 300px; max-width: 100%; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); background: white;"></canvas>
    
    <br><br>
    
    <button onclick="downloadIcon()" style="padding:15px 30px; font-size:20px; background:#ff8c00; color:white; font-weight:900; border:none; border-radius:10px; cursor:pointer;">
        📥 icon.jpg 다운로드
    </button>

    <script>
        var canvas = document.getElementById('myCanvas');
        var ctx = canvas.getContext('2d');
        var img = new Image();
        img.crossOrigin = "Anonymous";
        
        img.src = "icon.jpg"; 

        img.onload = function() {
            // 1. JPG는 투명이 안 되므로 전체를 하얀색으로 꽉 채웁니다.
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, 512, 512);

            // 2. 기사님 사진을 살짝 더 확대해서 빈틈을 화면 밖으로 밀어냅니다!
            ctx.drawImage(img, -15, -15, 542, 542); 

            // 3. 원래 사진의 울퉁불퉁한 테두리를 가리기 위해,
            // 완벽하게 둥글고 두꺼운 검정 테두리를 덧그려서 덮어버립니다!
            ctx.beginPath();
            ctx.arc(256, 256, 246, 0, 2 * Math.PI);
            ctx.lineWidth = 20; // 빵빵한 두께로 빈틈 철벽 방어!
            ctx.strokeStyle = "black";
            ctx.stroke();
        };

        function downloadIcon() {
            var link = document.createElement('a');
            // 🔥 기사님 요청대로 다시 JPG로 바꿨습니다! 🔥
            link.download = 'icon.jpg'; 
            link.href = canvas.toDataURL("image/jpeg", 1.0);
            link.click();
        }
    </script>
</body>
</html>
