<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아이콘 변환기</title>
</head>
<body style="text-align:center; padding-top:50px; font-family:sans-serif;">
    <h2>🎨 RyanL 아이콘 자동 생성기</h2>
    <p>아래 사진이 마음에 드시면 다운로드 버튼을 누르세요!</p>
    
    <canvas id="myCanvas" width="512" height="512" style="border:1px dashed #ccc; width: 300px; max-width: 100%; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.2);"></canvas>
    
    <br><br>
    
    <button onclick="downloadIcon()" style="padding:15px 30px; font-size:20px; background:#ff8c00; color:white; font-weight:900; border:none; border-radius:10px; cursor:pointer;">
        📥 icon.jpg 다운로드
    </button>

    <script>
        var canvas = document.getElementById('myCanvas');
        var ctx = canvas.getContext('2d');
        var img = new Image();
        img.crossOrigin = "Anonymous";
        
        // 깃허브에 있는 기사님 트럭 로고를 불러옵니다!
        img.src = "mlogo.jpg"; 

        img.onload = function() {
            // 1. 하얀색 바탕 칠하기
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, 512, 512);
            
            // 2. 트럭 이미지를 테두리에 안 닿게 살짝 축소해서 쏙 집어넣기
            ctx.drawImage(img, 60, 60, 392, 392);

            // 3. 겉에 빵빵하고 예쁜 검정색 둥근 테두리 그리기
            ctx.beginPath();
            ctx.arc(256, 256, 246, 0, 2 * Math.PI);
            ctx.lineWidth = 12;
            ctx.strokeStyle = "black";
            ctx.stroke();
        };

        // 폰으로 사진을 저장하는 기능!
        function downloadIcon() {
            var link = document.createElement('a');
            link.download = 'icon.jpg';
            link.href = canvas.toDataURL("image/jpeg", 1.0);
            link.click();
        }
    </script>
</body>
</html>
