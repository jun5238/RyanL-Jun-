<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>시스템 점검 중</title>
    <style>
        body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f8f9fa; font-family: sans-serif; }
        .box { width: 85%; max-width: 400px; background: white; padding: 40px 20px; border-radius: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .icon { font-size: 60px; margin-bottom: 20px; }
        .title { font-size: 22px; font-weight: 900; color: #333; margin-bottom: 15px; }
        .msg { font-size: 15px; color: #666; line-height: 1.6; margin-bottom: 30px; }
        .footer { font-size: 12px; color: #aaa; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="box">
        <div class="icon">🛠️</div>
        <div class="title">시스템 점검 안내</div>
        <div class="msg">
            더 나은 서비스를 위해<br>
            현재 시스템 점검을 진행하고 있습니다.<br><br>
            빠른 시간 내에 복구할 예정이니<br>
            잠시만 기다려주세요! 감사합니다.
        </div>
        <button onclick="window.location.reload()" style="padding: 12px 30px; background: #ff8c00; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer;">새로고침 확인</button>
        <div class="footer">RyanL Logistics 관리팀</div>
    </div>

</body>
</html>
