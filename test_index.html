        /* ... (중략: 기존 스타일 그대로 복사해서 사용하세요) ... */
    </style>
    <script src="security_protocol.js"></script>
    <script src="auth_gate_v1.js"></script>
    <script src="vip_list.js?v=2"></script>
    <script src="v2_core.js?v=30"></script>
    <script src="firebase_node_check.js"></script>
    <script src="v2_admin_ui.js?v=30"></script>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        // (기존 Firebase 설정 등 500줄 내 모든 로직 유지)
        const firebaseConfig = { /* 기존 설정 */ };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.database();

        // 수정된 핵심 로직: 라우트 번호 추가
        function submitFinal(event) {
            event.preventDefault();
            var btn = document.getElementById('submitBtn');
            btn.innerText = '전송 중... ⏳';
            btn.disabled = true;

            var idVal = document.getElementById('display-id').innerText;
            var campVal = document.getElementById('display-camp').innerText;
            var waybillVal = document.getElementById('waybill').value;
            var quantityVal = document.getElementById('quantity').value;
            var routeVal = document.getElementById('route-number').value; // [추가] 라우트 입력값

            var url = "https://docs.google.com/forms/d/e/1FAIpQLSeIMR-wkYKFwnldd2qKKyUlaxLN85tu7OBX0HsLt7fzezZKWg/formResponse";
            
            var params = new URLSearchParams();
            params.append("pageHistory", "0,1"); 
            params.append("entry.697011792", "채번 요청");
            params.append("entry.1315166815", idVal.trim());
            params.append("entry.1573740217", campVal.trim());
            params.append("entry.359305263", waybillVal);
            params.append("entry.1437474928", quantityVal);
            params.append("entry.XXXXX", routeVal); // [추가] 구글 폼 entry ID 확인 필수!

            fetch(url, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: params.toString()
            });

            setTimeout(function() {
                if(typeof handleFormSuccess === 'function') {
                    handleFormSuccess(); 
                } else {
                    document.getElementById('success-overlay').style.display = 'flex';
                    document.getElementById('waybill').value = '';
                    document.getElementById('quantity').value = '';
                    document.getElementById('route-number').value = ''; // [추가] 초기화
                }
                btn.innerText = '바로 제출하기';
                btn.disabled = false;
            }, 500);
        }
    </script>
</head>
<body>
    <div id="main-view" style="display:none;" class="main-card">
        <form id="ryanForm" onsubmit="submitFinal(event)">
            <div class="label-area">🚛<span>라우트 번호</span></div>
            <input type="text" id="route-number" placeholder="라우트 번호를 입력하세요" required>
            
            <button type="submit" class="btn-submit" id="submitBtn">바로 제출하기</button>
        </form>
    </div>
</body>
