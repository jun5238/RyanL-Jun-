<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>라이언엘 채번 시스템</title>
    
    <link rel="manifest" href="test_manifest.json">
    <link rel="apple-touch-icon" href="icon.jpg">
    <link rel="icon" sizes="192x192" href="icon.jpg">

    <link rel="stylesheet" href="test_style.css?v=0317_test">

    <script src="security_protocol.js"></script>
    <script src="auth_gate_v1.js"></script>
    <script src="vip_list.js?v=2"></script>
    <script src="test_core.js?v=0317_test"></script> 
    <script src="firebase_node_check.js"></script>
    <script src="test_admin_ui.js"></script>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDIA5MGfvoHQvrgCm1Wf1d7XcgC13b_D9Q",
            authDomain: "ryanl-test.firebaseapp.com",
            projectId: "ryanl-test",
            storageBucket: "ryanl-test.appspot.com",
            messagingSenderId: "818440188305",
            appId: "1:818440188305:web:b5f89513e57eab942c2a30",
            databaseURL: "https://ryanl-test-default-rtdb.firebaseio.com"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();

        function sendApprovalRequest() {
            var reqId = document.getElementById('req-id').value.trim();
            var reqCamp = document.getElementById('user-camp').value;
            var reqName = document.getElementById('req-name').value.trim();
            var reqCompany = document.getElementById('req-company').value.trim();

            if(!reqId || !reqName || !reqCompany) {
                myAlert("아이디, 성함, 업체명을 모두 입력해주세요!");
                return;
            }

            db.ref("승인대기방/" + reqId).set({
                id: reqId,
                camp: reqCamp,
                name: reqName,
                company: reqCompany,
                status: "대기중",
                timestamp: new Date().getTime()
            }).then(() => {
                document.getElementById('custom-alert-overlay').style.display = 'none';
                document.getElementById('approval-success-overlay').style.display = 'flex';
                document.getElementById('req-id').value = '';
                document.getElementById('req-name').value = '';
                document.getElementById('req-company').value = '';
            }).catch((error) => {
                myAlert("오류 발생: " + error.message);
            });
        }

        db.ref("승인대기방").on('value', (snapshot) => {
            const badge = document.getElementById('admin-badge');
            const data = snapshot.val();
            if (data) {
                const count = Object.keys(data).length;
                badge.innerText = count;
                badge.style.display = 'block';
            } else {
                badge.style.display = 'none';
            }
        });
    </script>
</head>
<body>
    <div id="splash-screen">
        <img src="loading.jpg" class="splash-logo" alt="RyanL Loading">
        <div class="splash-text">Loading.....</div>
    </div>

    <div id="custom-alert-box" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:999999; justify-content:center; align-items:center;">
        <div style="background:#fff; width:80%; max-width:300px; border-radius:15px; padding:25px; text-align:center; box-shadow:0 10px 25px rgba(0,0,0,0.3);">
            <div style="font-size:30px; margin-bottom:10px;">⚠️</div>
            <div id="custom-alert-msg" style="font-size:15px; font-weight:bold; color:#333; line-height:1.5; margin-bottom:20px;">메시지 내용</div>
            <button onclick="document.getElementById('custom-alert-box').style.display='none'" style="width:100%; padding:12px; background:#ff8c00; color:#fff; border:none; border-radius:10px; font-weight:900; cursor:pointer;">확인</button>
        </div>
    </div>

    <div id="custom-alert-overlay" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.6); z-index:100000; justify-content:center; align-items:center;">
        <div style="background:#fff; width:85%; max-width:320px; border-radius:15px; padding:25px 20px; text-align:center;">
            <div style="font-size:35px; margin-bottom:10px;">🚨</div>
            <div style="font-size:18px; font-weight:900; color:#152b52; margin-bottom:15px;">미승인 아이디입니다</div>
            <div style="font-size:14px; color:#444; line-height:1.6; text-align:left; background:#f4f4f4; padding:15px; border-radius:10px; margin-bottom:20px;">
                <input type="text" id="req-id" placeholder="아이디" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ccc; border-radius:5px; box-sizing:border-box;">
                <input type="text" id="req-name" placeholder="성함" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ccc; border-radius:5px; box-sizing:border-box;">
                <input type="text" id="req-company" placeholder="업체명" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ccc; border-radius:5px; box-sizing:border-box;">
            </div>
            <div style="display:flex; gap:10px;">
                <button onclick="document.getElementById('custom-alert-overlay').style.display='none'" style="width:40%; padding:14px; background:#ccc; color:#333; border:none; border-radius:10px; font-weight:bold;">취소</button>
                <button onclick="sendApprovalRequest()" style="width:60%; padding:14px; background:#ff8c00; color:#fff; border:none; border-radius:10px; font-weight:900;">승인 요청</button>
            </div>
        </div>
    </div>

    <div id="approval-success-overlay" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.6); z-index:100000; justify-content:center; align-items:center;">
        <div style="background:#fff; width:80%; max-width:300px; border-radius:15px; padding:30px 20px; text-align:center;">
            <div style="font-size:45px; margin-bottom:15px;">✅</div>
            <div style="font-size:20px; font-weight:900; color:#152b52; margin-bottom:10px;">신청 완료!</div>
            <button onclick="document.getElementById('approval-success-overlay').style.display='none'" style="width:100%; padding:14px; background:#ff8c00; color:#fff; border:none; border-radius:10px; font-weight:900;">확인</button>
        </div>
    </div>

    <div class="wrapper">
        <div class="header" style="position: relative;">
            <div onclick="window.location.reload(true);" style="position: absolute; top: 10px; right: 10px; padding: 6px 12px; background-color: #ff8c00; color: white; border-radius: 15px; font-weight: 900; font-size: 13px; z-index: 10; cursor:pointer;">🔄 새로고침</div>
            
            <div style="position: relative; display: inline-block;">
                <img src="mlogo.jpg" class="logo-img" oncontextmenu="return false;">
                <div id="admin-badge" style="display:none; position:absolute; top:-5px; right:-5px; background:red; color:white; font-size:10px; font-weight:bold; padding:2px 6px; border-radius:10px; z-index:11;">0</div>
            </div>

            <div class="rocket-title">🚀 채번 요청 1초컷</div>
            <div class="sub-tag">천안1캠프 전용 스마트 시스템 <span style="background:#e74c3c; color:white; font-size:11px; font-weight:900; padding:3px 6px; border-radius:5px;">테스트 버전</span></div>
        </div>
        
        <div id="setup-view">
            <label class="setup-label">👤 기사님 아이디</label>
            <input type="text" id="user-id" placeholder="예: RyanL">
            <label class="setup-label">📍 소속 캠프</label>
            <select id="user-camp">
                <option value="">선택하세요</option>
                <option value="음봉MB">음봉MB</option>
                <option value="송촌MB">송촌MB</option>
            </select>
            
            <button class="btn-submit" onclick="saveInfo()" style="margin-top: 20px;">로그인</button>

            <button class="btn-guide" onclick="toggleGuide()" style="margin-top:15px;">❓ 설치 방법 및 오류 해결 가이드</button>
            <div id="guide-content" style="display:none;">
                <div class="guide-box">
                    <span class="guide-title">📱 바탕화면 바로가기 설치</span><br>
                    • 갤럭시: 점3개 -> 홈 화면에 추가<br>
                    • 아이폰: 공유 -> 홈 화면에 추가
                </div>
            </div>
        </div>

        <div id="admin-login-view" style="display:none; text-align: center;">
            <label class="setup-label">🔒 관리자 보안 접속</label>
            <input type="password" id="admin-pw">
            <button class="btn-submit" onclick="checkAdminPw()">접속하기</button>
        </div>

        <div id="admin-dashboard-view" style="display:none;" class="main-card">
            <div id="admin-list-content"></div>
            <button class="btn-change" onclick="closeAdmin()">나가기</button>
        </div>

        <div id="main-view" style="display:none;" class="main-card">
            <div class="info-box">
                <span class="user-info">현재 계정: <strong><span id="display-id"></span></strong></span>
                <button class="btn-change" onclick="showSetup()">변경</button>
            </div>
            <form action="https://docs.google.com/forms/d/e/1FAIpQLSeIMR-wkYKFwnldd2qKKyUlaxLN85tu7OBX0HsLt7fzezZKWg/formResponse" method="POST" target="hidden_iframe" onsubmit="window.isSubmitted=true;">
                <input type="hidden" name="entry.1315166815" id="form-id">
                <input type="hidden" name="entry.1573740217" id="form-camp">
                <input type="text" name="entry.359305263" id="waybill" placeholder="송장번호" required>
                <input type="number" name="entry.1437474928" id="quantity" placeholder="수량" required>
                <button type="submit" class="btn-submit" id="submitBtn">바로 제출하기</button>
            </form>
            <iframe name="hidden_iframe" style="display:none;" onload="if(window.isSubmitted){ myAlert('전송 완료!'); window.isSubmitted=false; }"></iframe>
        </div>

        <div class="footer">
            <span class="contact-info">버그 및 오류 문의 : cndrone@naver.com</span><br>
            © 2026 RyanL Logistics. <br>
            Created by LJH <span style="font-size:10px; color:#ddd;">이준희</span>
        </div>
    </div>
</body>
</html>
