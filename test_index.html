<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>라이언엘 채번 시스템</title>
    
    <link rel="manifest" href="test_manifest.json">
    <link rel="apple-touch-icon" href="icon.jpg">
    <link rel="icon" sizes="192x192" href="icon.jpg">

    <link rel="stylesheet" href="test_style.css?v=0317_final">

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // 파이어베이스 설정
        const firebaseConfig = {
            apiKey: "AIzaSyDIA5MGfvoHQvrgCm1Wf1d7XcgC13b_D9Q",
            authDomain: "ryanl-test.firebaseapp.com",
            projectId: "ryanl-test",
            storageBucket: "ryanl-test.appspot.com",
            messagingSenderId: "818440188305",
            appId: "1:818440188305:web:b5f89513e57eab942c2a30",
            databaseURL: "https://ryanl-test-default-rtdb.firebaseio.com"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();

        // 관리자 배지 (승인대기 인원 표시) - 공통 기능이라 여기 유지
        db.ref("승인대기방").on('value', (snapshot) => {
            const badge = document.getElementById('admin-badge');
            const data = snapshot.val();
            if (data) {
                const count = Object.keys(data).length;
                badge.innerText = count;
                badge.style.display = 'block';
            } else {
                badge.style.display = 'none';
            }
        });
    </script>

    <script src="test_core.js?v=0317_final"></script> 
    <script src="test_admin.js?v=0317_final"></script>

</head>
<body>
    <div id="splash-screen">
        <img src="loading.jpg" class="splash-logo" alt="RyanL Loading">
        <div class="splash-text">Loading.....</div>
    </div>

    <div id="custom-alert-box" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:999999; justify-content:center; align-items:center;">
        <div style="background:#fff; width:80%; max-width:300px; border-radius:15px; padding:25px; text-align:center;">
            <div style="font-size:30px; margin-bottom:10px;">⚠️</div>
            <div id="custom-alert-msg" style="font-size:15px; font-weight:bold; color:#333; line-height:1.5; margin-bottom:20px;">메시지 내용</div>
            <button onclick="document.getElementById('custom-alert-box').style.display='none'" style="width:100%; padding:12px; background:#ff8c00; color:#fff; border:none; border-radius:10px; font-weight:900;">확인</button>
        </div>
    </div>

    <div id="custom-alert-overlay" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.6); z-index:100000; justify-content:center; align-items:center;">
        <div style="background:#fff; width:85%; max-width:320px; border-radius:15px; padding:25px 20px; text-align:center;">
            <div style="font-size:35px; margin-bottom:10px;">🚨</div>
            <div style="font-size:18px; font-weight:900; color:#152b52; margin-bottom:15px;">미승인 아이디입니다</div>
            <div style="font-size:14px; color:#444; text-align:left; background:#f4f4f4; padding:15px; border-radius:10px; margin-bottom:20px;">
                관리자에게 승인을 요청하세요.<br><br>
                <input type="text" id="req-id" placeholder="아이디 (예: RyanL)" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ccc; border-radius:5px;">
                <input type="text" id="req-name" placeholder="성함 (예: 홍길동)" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ccc; border-radius:5px;">
                <input type="text" id="req-company" placeholder="업체명 (예: 라이언엘)" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ccc; border-radius:5px;">
                <span style="color:#ff3b30; font-size:12px; font-weight:bold;">※ 허위 정보 입력 시 승인이 거절됩니다.</span>
            </div>
            <div style="display:flex; gap:10px;">
                <button onclick="document.getElementById('custom-alert-overlay').style.display='none'" style="width:40%; padding:14px; background:#ccc; border-radius:10px;">취소</button>
                <button onclick="sendApprovalRequest()" style="width:60%; padding:14px; background:#ff8c00; color:#fff; border:none; border-radius:10px; font-weight:900;">승인 요청하기</button>
            </div>
        </div>
    </div>

    <div class="wrapper">
        <div class="header">
            <div onclick="window.location.reload(true);" style="position: absolute; top: 10px; right: 10px; padding: 6px 12px; background-color: #ff8c00; color: white; border-radius: 15px; font-weight: 900; font-size: 13px; z-index: 10;">🔄 새로고침</div>
            <div style="position: relative; display: inline-block;">
                <img src="mlogo.jpg" class="logo-img">
                <div id="admin-badge" style="display:none; position:absolute; top:-5px; right:-5px; background:red; color:white; font-size:10px; font-weight:bold; padding:2px 6px; border-radius:10px;">0</div>
            </div>
            <div class="rocket-title">🚀 채번 요청 1초컷</div>
            <div class="sub-tag">천안1캠프 전용 스마트 시스템 <span style="background:#e74c3c; color:white; font-size:11px; font-weight:900; padding:3px 6px; border-radius:5px;">테스트 버전</span></div>
        </div>

        <div id="setup-view">
            <label class="setup-label">👤 기사님 아이디</label>
            <input type="text" id="user-id" placeholder="예: RyanL">
            <label class="setup-label">📍 소속 캠프</label>
            <select id="user-camp">
                <option value="">선택하세요</option>
                <option value="음봉MB">음봉MB</option>
                <option value="송촌MB">송촌MB</option>
            </select>
            <button class="btn-submit" onclick="saveInfo()" style="margin-top: 20px;">로그인</button>
            <button class="btn-guide" onclick="toggleGuide()">❓ 설치 및 오류 해결 가이드</button>
            <div id="guide-content">
                <div class="guide-box"> 갤럭시: 크롬 '홈 화면에 추가' / 아이폰: 사파리 '홈 화면에 추가'</div>
            </div>
        </div>

        <div id="admin-login-view" style="display:none; width: 92%; max-width: 380px; text-align: center; margin: 0 auto;">
            <label class="setup-label" style="color:var(--orange);">🔒 관리자 보안 접속</label>
            <input type="password" id="admin-pw" placeholder="비밀번호를 입력하세요">
            <button class="btn-submit" onclick="checkAdminPw()" style="margin-top: 20px;">접속하기</button>
            <button class="btn-change" onclick="cancelAdmin()" style="margin-top: 10px; background:#f0f0f0; color:#333;">돌아가기</button>
        </div>

        <div id="admin-dashboard-view" style="display:none;" class="main-card">
            <div style="text-align: center; border-bottom: 2px dashed rgba(255,255,255,0.3); padding-bottom: 10px; margin-bottom: 15px;">
                <h3 style="color:var(--orange); margin:0;">📊 승인 대기 명단</h3>
            </div>
            <div id="admin-list-content" style="max-height: 400px; overflow-y: auto;"></div>
            <button class="btn-change" onclick="closeAdmin()" style="margin-top: 20px;">메인으로 나가기</button>
        </div>

        <div id="main-view" style="display:none;" class="main-card">
            <div class="info-box">
                <span class="user-info">현재 계정: <strong><span id="display-id"></span> <span id="display-camp"></span></strong></span>
                <button class="btn-change" onclick="showSetup()">정보 변경</button>
            </div>
            <form action="https://docs.google.com/forms/d/e/1FAIpQLSeIMR-wkYKFwnldd2qKKyUlaxLN85tu7OBX0HsLt7fzezZKWg/formResponse" method="POST" target="hidden_iframe" onsubmit="window.isSubmitted=true; document.getElementById('submitBtn').innerText='전송 중... ⏳';">
                <input type="hidden" name="entry.1315166815" id="form-id">
                <input type="hidden" name="entry.1573740217" id="form-camp">
                <div class="label-area">📦<span>운송장 번호</span></div>
                <div class="input-group">
                    <input type="text" name="entry.359305263" id="waybill" placeholder="붙여넣기 클릭 👉" required>
                    <button type="button" class="btn-paste" onclick="pasteClipboard()">👆 클릭</button>
                </div>
                <div class="label-area">🔢<span>채번 수량</span></div>
                <input type="number" name="entry.1437474928" id="quantity" placeholder="숫자만 입력" required>
                <button type="submit" class="btn-submit" id="submitBtn">바로 제출하기</button>
            </form>
            <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;" onload="if(window.isSubmitted){ myAlert('전송 완료!'); document.getElementById('waybill').value=''; document.getElementById('quantity').value=''; document.getElementById('submitBtn').innerText='바로 제출하기'; window.isSubmitted=false; }"></iframe>
        </div>

        <div class="footer">
            <span class="contact-info">버그 및 오류 문의 : cndrone@naver.com</span>
            © 2026 RyanL Logistics.<br>
            <span class="designer-tag">Created by LJH<span class="hidden-name">이준희</span></span>
        </div>
    </div>
</body>
</html>
