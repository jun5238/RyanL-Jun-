<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>라이언엘 우체국 테스트</title>
    <link rel="stylesheet" href="style.css?v=2">
    <script src="security_protocol.js"></script>
    <script src="auth_gate_v1.js"></script>
    <script src="vip_list.js?v=2"></script>
    <script src="rl_core.js?v=2"></script> 
    <script src="firebase_node_check.js"></script>
    <script src="admin_ui.js"></script>
</head>
<body>
    <div id="splash-screen">
        <img src="loading.jpg" class="splash-logo" alt="RyanL Loading">
        <div class="splash-text">Loading.....</div>
    </div>

    <div id="success-overlay" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.6); z-index:100000; justify-content:center; align-items:center;">
        <div style="background:#fff; width:80%; max-width:300px; border-radius:15px; padding:30px 20px; text-align:center; box-shadow:0 10px 25px rgba(0,0,0,0.2);">
            <div style="font-size:45px; margin-bottom:15px;">✅</div>
            <div style="font-size:20px; font-weight:900; color:#152b52; margin-bottom:10px;">전송 완료!</div>
            <button onclick="document.getElementById('success-overlay').style.display='none'" style="width:100%; padding:14px; background:#ff8c00; color:#fff; border:none; border-radius:10px; font-size:16px; font-weight:900; cursor:pointer;">확인</button>
        </div>
    </div>

    <div class="wrapper">
        <div class="header">
            <div onclick="window.location.reload(true);" style="position: absolute; top: 10px; right: 10px; padding: 6px 12px; background-color: #ff8c00; color: white; border-radius: 15px; font-weight: 900; font-size: 13px; cursor: pointer; z-index: 10;">🔄 새로고침</div>
            <img src="mlogo.jpg" class="logo-img">
            <div class="rocket-title">🚀 우체국 전송 모드 (Non-iframe)</div>
        </div>

        <div id="setup-view">
            <label class="setup-label">👤 기사님 아이디</label>
            <input type="text" id="user-id" placeholder="예: RyanL">
            <label class="setup-label">📍 소속 캠프</label>
            <select id="user-camp">
                <option value="">선택하세요</option>
                <option value="음봉MB">음봉MB</option>
                <option value="송촌MB">송촌MB</option>
            </select>
            <button class="btn-submit" onclick="saveInfo()" style="margin-top: 20px;">로그인</button>
        </div>

        <div id="main-view" style="display:none;" class="main-card">
            <div class="info-box">
                <span class="user-info">현재 계정: <strong><span id="display-id"></span> <span id="display-camp"></span></strong></span>
                <button class="btn-change" onclick="showSetup()">정보 변경</button>
            </div>
            
            <form id="ryanForm" onsubmit="submitToPostOffice(event)">
                <input type="hidden" id="form-id">
                <input type="hidden" id="form-camp">
                
                <div class="label-area">📦<span>운송장 번호</span></div>
                <input type="text" id="waybill" placeholder="운송장 번호를 입력하세요" required>
                
                <div class="label-area">🔢<span>채번 수량</span></div>
                <input type="number" id="quantity" placeholder="숫자만 입력" required>
                
                <button type="submit" class="btn-submit" id="submitBtn" style="margin-top:20px;">바로 제출하기</button>
            </form>

            <script>
                function submitToPostOffice(event) {
                    event.preventDefault();
                    var btn = document.getElementById('submitBtn');
                    btn.innerText = '전송 중... ⏳';
                    btn.disabled = true;

                    // 1. 입력값 낚아채기
                    var idVal = document.getElementById('form-id').value;
                    var campVal = document.getElementById('form-camp').value;
                    var waybillVal = document.getElementById('waybill').value;
                    var quantityVal = document.getElementById('quantity').value;

                    // 2. 구글 폼 주소
                    var url = "https://docs.google.com/forms/d/e/1FAIpQLSfiEqOUQAo_pCMhh1q3E-_VYxAkDKp5kn8RqB3_mcHL6ksYeQ/formResponse";
                    
                    // 3. FormData 객체 생성 및 찐 번호표 매칭
                    var formData = new URLSearchParams();
                    formData.append("entry.893130037", "채번 요청");
                    formData.append("entry.442655354", idVal);
                    formData.append("entry.786194174", campVal);
                    formData.append("entry.633777622", waybillVal);
                    formData.append("entry.1141746706", quantityVal);

                    // 4. fetch 전송 (아이프레임 없이 다이렉트!)
                    fetch(url, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: formData.toString()
                    }).then(function() {
                        document.getElementById('success-overlay').style.display = 'flex';
                        document.getElementById('waybill').value = '';
                        document.getElementById('quantity').value = '';
                        btn.innerText = '바로 제출하기';
                        btn.disabled = false;
                    }).catch(function(error) {
                        alert("❌ 전송 실패! 관리자에게 문의하세요.");
                        btn.disabled = false;
                    });
                }
            </script>
        </div>
    </div>
</body>
</html>
