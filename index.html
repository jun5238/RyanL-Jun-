<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>라이언엘 채번 시스템</title>
    <style>
        :root { --navy: #152b52; --orange: #ff8c00; }
        body { font-family: -apple-system, sans-serif; background: #ffffff; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        
        /* 상단 영역: 기사님이 원하시는 좌측 사진 스타일 (흰 배경 + 파란 로고) */
        .header { width: 100%; padding: 40px 0 20px 0; background: #ffffff; text-align: center; }
        .logo-img { width: 220px; height: auto; display: inline-block; }
        .rocket-title { font-size: 26px; font-weight: 800; color: #333; margin: 20px 0 5px 0; }
        /* 아래 문구: 스마트 시스템 빼고 깔끔하게 원복 */
        .sub-tag { font-size: 15px; color: #666; font-weight: bold; }

        /* 하단 카드 디자인 유지 */
        .main-card { 
            width: 92%; max-width: 400px; background: var(--navy); border-radius: 12px; 
            padding: 25px 20px; box-sizing: border-box; border: 3px solid var(--orange);
            box-shadow: 0 6px 20px rgba(255, 140, 0, 0.3); margin-top: 10px;
        }

        .info-box { margin-bottom: 25px; text-align: left; }
        .user-info { color: #fff; font-size: 17px; margin-bottom: 12px; }
        .btn-change { 
            width: 100%; padding: 12px; background: #ffffff; color: #333; border: none;
            border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer;
        }

        .input-group { margin-bottom: 22px; text-align: left; }
        .label-area { display: flex; align-items: center; margin-bottom: 12px; color: #fff; font-weight: bold; font-size: 17px; }
        .label-area span { margin-left: 8px; }

        input { 
            width: 100%; padding: 16px; border: none; border-radius: 8px; 
            font-size: 17px; box-sizing: border-box; outline: none; background: #ffffff; color: #000;
        }

        .btn-submit { 
            width: 100%; padding: 18px; background: var(--orange); color: #fff; 
            border: none; border-radius: 10px; font-size: 19px; 
            font-weight: bold; cursor: pointer; margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="header">
    <img src="https://raw.githubusercontent.com/jun5238/RyanL-Jun-/main/1000003045.jpg" class="logo-img" alt="RyanL Logistics">
    <div class="rocket-title">🚀 채번 요청 1초컷</div>
    <div class="sub-tag">천안1캠프 전용</div>
</div>

<div id="main-view" class="main-card">
    <div class="info-box">
        <div class="user-info">접속 중: <strong><span id="display-id">julee82</span></strong> (<span id="display-camp">음봉MB</span>)</div>
        <button class="btn-change">정보 변경</button>
    </div>

    <form>
        <div class="input-group">
            <div class="label-area">📦<span>운송장 번호</span></div>
            <input type="text" placeholder="복사한 번호 붙여넣기" required>
        </div>
        <div class="input-group">
            <div class="label-area">🔢<span>채번 수량</span></div>
            <input type="number" value="1" required>
        </div>
        <button type="submit" class="btn-submit">바로 제출하기</button>
    </form>
</div>

</body>
</html>
