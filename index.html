<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>라이언엘 채번 시스템</title>
    <style>
        :root { 
            --navy-bg: #152b52; /* 사진 속 그 진한 남색 */
            --orange-line: #ff8c00; /* 주황색 테두리 광채 */
            --input-bg: #ffffff;
        }
        body { font-family: -apple-system, sans-serif; background: #ffffff; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        
        /* 상단 로고 영역 */
        .header { width: 100%; padding: 30px 0 10px 0; text-align: center; background: #fff; }
        .logo-img { width: 220px; height: auto; }
        .rocket-title { font-size: 24px; font-weight: 800; color: #333; margin: 15px 0 5px 0; }
        .sub-tag { font-size: 14px; color: #666; margin-bottom: 20px; }

        /* 메인 카드 영역 (사진 속 남색 배경) */
        .main-card { 
            width: 92%; max-width: 380px; background: var(--navy-bg); border-radius: 12px; 
            padding: 25px 20px; box-sizing: border-box; 
        }

        /* 현재 계정 영역 */
        .info-box { margin-bottom: 25px; }
        .user-text { color: #fff; font-size: 16px; margin-bottom: 12px; text-align: left; }
        .user-text strong { color: #fff; }
        .btn-change { 
            width: 100%; padding: 12px; background: #fff; color: #333; border: 2px solid var(--orange-line);
            border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer;
        }

        /* 입력 폼 영역 */
        .input-group { margin-bottom: 25px; text-align: left; }
        .label-area { display: flex; align-items: center; margin-bottom: 10px; color: #fff; font-weight: bold; font-size: 16px; }
        .label-area span { margin-left: 8px; }

        input { 
            width: 100%; padding: 16px; border: 1px solid #fff; border-radius: 8px; 
            font-size: 17px; box-sizing: border-box; outline: none; background: #fff; color: #000;
        }

        /* 제출하기 버튼 (주황 테두리 강조) */
        .btn-submit { 
            width: 100%; padding: 18px; background: var(--navy-bg); color: #fff; 
            border: 2px solid var(--orange-line); border-radius: 10px; font-size: 18px; 
            font-weight: bold; cursor: pointer; box-shadow: 0 0 10px rgba(255,140,0,0.4);
        }

        .footer { margin-top: 30px; font-size: 11px; color: #ccc; }
    </style>
</head>
<body>

<div class="header">
    <img src="https://raw.githubusercontent.com/jun5238/RyanL-Jun-/main/1000003027.jpg" class="logo-img">
    <div class="rocket-title">🚀 채번 요청 1초컷</div>
    <div class="sub-tag">천안1캠프 전용</div>
</div>

<div class="main-card">
    <div class="info-box">
        <div class="user-text">현재 계정: <strong id="display-id">julee82</strong> (<span id="display-camp">음봉MB</span>)</div>
        <button class="btn-change" onclick="location.reload()">정보 변경</button>
    </div>

    <form id="f" action="https://docs.google.com/forms/d/e/1FAIpQLScC6H-XbS7l6T_N6k8_u_iF0V-u8J_X8V8J8V8J8V8J8V8J8V8J8V8/formResponse" method="POST" target="ifr">
        <input type="hidden" name="entry.144445555" id="form-id" value="julee82">
        <input type="hidden" name="entry.166667777" id="form-camp" value="음봉MB">
        <input type="hidden" name="entry.188889999" value="채번 요청">

        <div class="input-group">
            <div class="label-area">📦<span>운송장 번호</span></div>
            <input type="text" name="entry.200001111" id="waybill" placeholder="복사한 운송장 붙여넣기" required>
        </div>

        <div class="input-group">
            <div class="label-area">🔢<span>채번 수량</span></div>
            <input type="number" name="entry.222223333" id="quantity" placeholder="숫자만 입력 (예: 1)" required>
        </div>

        <button type="submit" class="btn-submit">바로 제출하기</button>
    </form>
</div>

<div class="footer">© 2026 RYANL LOGISTICS SYSTEM</div>

<iframe name="ifr" style="display:none;" onload="if(s){alert('제출 완료!');document.getElementById('waybill').value='';}"></iframe>

<script>
    let s = false;
    document.getElementById('f').onsubmit = function() { s = true; };
    // 기사님 아이디와 캠프는 폰 화면 그대로 기본값 세팅했습니다.
    window.onload = function() {
        const id = localStorage.getItem('rl_id') || 'julee82';
        const camp = localStorage.getItem('rl_camp') || '음봉MB';
        document.getElementById('display-id').innerText = id;
        document.getElementById('display-camp').innerText = camp;
        document.getElementById('form-id').value = id;
        document.getElementById('form-camp').value = camp;
    }
</script>
</body>
</html>
