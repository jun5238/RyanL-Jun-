<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>라이언엘 채번 1초컷</title>
    <style>
        :root { --p: #ff8c00; --bg: #1a1c1e; --c: #2d2f31; }
        body { font-family: sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 400px; background: var(--c); border-radius: 20px; padding: 30px 20px; box-sizing: border-box; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* 로고를 글자로 멋지게 만들었습니다 */
        .logo { font-size: 38px; font-weight: 900; letter-spacing: -2px; margin-bottom: 5px; }
        .logo span { color: var(--p); }
        .logo-sub { font-size: 12px; letter-spacing: 4px; color: #aaa; text-transform: uppercase; margin-bottom: 20px; font-weight: bold; }
        
        h2 { margin: 10px 0 5px 0; font-size: 22px; }
        p { color: #888; font-size: 14px; margin-bottom: 30px; }
        .info-box { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px dashed #555; }
        .input-group { text-align: left; margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 15px; color: #ccc; }
        input, select { width: 100%; padding: 16px; border: 2px solid #444; border-radius: 12px; background: #fff; color: #000; font-size: 16px; box-sizing: border-box; outline: none; }
        input:focus, select:focus { border-color: var(--p); }
        button { width: 100%; padding: 18px; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-submit { background: linear-gradient(135deg, #ff8c00, #ff5500); color: white; margin-top: 10px; }
        .btn-edit { background: #444; color: #ccc; font-size: 13px; padding: 8px 15px; margin-top: 10px; width: auto; }
        .footer { margin-top: 30px; font-size: 11px; color: #555; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">Ryan<span>L</span></div>
    <div class="logo-sub">Logistics</div>
    
    <h2>🚀 채번 요청 1초컷</h2>
    <p>천안1캠프 전용 시스템</p>

    <div id="setup-view">
        <div class="input-group">
            <label>👤 기사님 아이디</label>
            <input type="text" id="user-id" placeholder="예: julee82">
        </div>
        <div class="input-group">
            <label>📍 소속 캠프 선택</label>
            <select id="user-camp">
                <option value="">탭해서 선택하세요 ▼</option>
                <option value="음봉MB">음봉MB</option>
                <option value="송촌MB">송촌MB</option>
            </select>
        </div>
        <button class="btn-submit" onclick="saveInfo()">정보 저장하고 시작하기</button>
    </div>

    <div id="main-view" style="display:none;">
        <div class="info-box">
            현재 계정: <strong id="display-id" style="color:var(--p)"></strong> (<span id="display-camp"></span>)
            <br>
            <button class="btn-edit" onclick="showSetup()">내 정보 수정</button>
        </div>

        <form id="f" action="https://docs.google.com/forms/d/e/1FAIpQLScC6H-XbS7l6T_N6k8_u_iF0V-u8J_X8V8J8V8J8V8J8V8J8V8/formResponse" method="POST" target="ifr">
            <input type="hidden" name="entry.144445555" id="form-id">
            <input type="hidden" name="entry.166667777" id="form-camp">
            <input type="hidden" name="entry.188889999" value="채번 요청">
            <div class="input-group">
                <label>📦 운송장 번호</label>
                <input type="text" name="entry.200001111" id="waybill" placeholder="번호 붙여넣기" required>
            </div>
            <div class="input-group">
                <label>🔢 채번 수량</label>
                <input type="number" name="entry.222223333" id="quantity" value="1" required>
            </div>
            <button type="submit" class="btn-submit">바로 제출하기</button>
        </form>
    </div>
    <div class="footer">© RYANL LOGISTICS. 2026.</div>
</div>

<iframe name="ifr" style="display:none;" onload="if(s){alert('제출 완료! 안운하세요!');document.getElementById('waybill').value='';}"></iframe>

<script>
    let s = false;
    document.getElementById('f').onsubmit = function() { s = true; };
    function saveInfo() {
        const id = document.getElementById('user-id').value;
        const camp = document.getElementById('user-camp').value;
        if(id && camp) {
            localStorage.setItem('rl_id', id);
            localStorage.setItem('rl_camp', camp);
            location.reload();
        } else { alert('아이디와 캠프를 확인해주세요!'); }
    }
    function showSetup() {
        document.getElementById('setup-view').style.display = 'block';
        document.getElementById('main-view').style.display = 'none';
    }
    window.onload = function() {
        const id = localStorage.getItem('rl_id');
        const camp = localStorage.getItem('rl_camp');
        if(id && camp) {
            document.getElementById('setup-view').style.display = 'none';
            document.getElementById('main-view').style.display = 'block';
            document.getElementById('display-id').innerText = id;
            document.getElementById('display-camp').innerText = camp;
            document.getElementById('form-id').value = id;
            document.getElementById('form-camp').value = camp;
        }
    }
</script>
</body>
</html>
