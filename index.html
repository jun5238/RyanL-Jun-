<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>라이언엘 채번 1초컷</title>
    <style>
        :root { --primary-color: #ff8c00; --bg-color: #1a1c1e; --card-bg: #2d2f31; --text-color: #ffffff; }
        body { font-family: sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 400px; background: var(--card-bg); border-radius: 20px; padding: 25px; box-sizing: border-box; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .logo-area img { width: 100%; max-width: 250px; height: auto; margin-bottom: 15px; border-radius: 10px; }
        h2 { margin: 10px 0 5px 0; font-size: 22px; }
        p { color: #aaa; font-size: 14px; margin-bottom: 25px; }
        .info-box { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px dashed #555; }
        .input-group { text-align: left; margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 15px; color: #ddd; }
        input, select { width: 100%; padding: 15px; border: 2px solid #444; border-radius: 10px; background: #fff; color: #000; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; padding: 18px; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .btn-submit { background: linear-gradient(135deg, #ff8c00, #ff5500); color: white; }
        .btn-edit { background: #444; color: #ccc; font-size: 13px; padding: 8px; margin-top: 10px; width: auto; }
        .footer { margin-top: 25px; font-size: 12px; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-area">
        <img src="https://raw.githubusercontent.com/jun5238/RyanL-Jun-/main/1000003013.jpg" alt="RyanL Logistics">
    </div>
    
    <h2>🚀 채번 요청 1초컷</h2>
    <p>천안1캠프 전용 시스템</p>

    <div id="setup-view">
        <div class="input-group">
            <label>👤 기사님 아이디</label>
            <input type="text" id="user-id" placeholder="예: julee82">
        </div>
        <div class="input-group">
            <label>📍 소속 캠프 선택</label>
            <select id="user-camp">
                <option value="">탭해서 선택하세요 ▼</option>
                <option value="음봉MB">음봉MB</option>
                <option value="송촌MB">송촌MB</option>
            </select>
        </div>
        <button class="btn-submit" onclick="saveInfo()">정보 저장하고 시작하기</button>
    </div>

    <div id="main-view" style="display:none;">
        <div class="info-box">
            현재 계정: <strong id="display-id" style="color:var(--primary-color)"></strong> (<span id="display-camp"></span>)
            <br>
            <button class="btn-edit" onclick="showSetup()">내 정보 수정</button>
        </div>

        <form id="delivery-form" action="https://docs.google.com/forms/d/e/1FAIpQLScC6H-XbS7l6T_N6k8_u_iF0V-u8J_X8V8J8V8J8V8J8V8J8V8/formResponse" method="POST" target="hidden_iframe">
            <input type="hidden" name="entry.144445555" id="form-id">
            <input type="hidden" name="entry.166667777" id="form-camp">
            <input type="hidden" name="entry.188889999" value="채번 요청">
            <div class="input-group">
                <label>📦 운송장 번호</label>
                <input type="text" name="entry.200001111" id="waybill" placeholder="복사한 번호 붙여넣기" required>
            </div>
            <div class="input-group">
                <label>🔢 채번 수량</label>
                <input type="number" name="entry.222223333" id="quantity" placeholder="숫자만 입력 (예: 1)" required>
            </div>
            <button type="submit" class="btn-submit">바로 제출하기</button>
        </form>
    </div>
    <div class="footer">© RyanL Logistics. All Rights Reserved.</div>
</div>

<iframe name="hidden_iframe" style="display:none;" onload="if(submitted){alert('제출 완료!');document.getElementById('waybill').value='';}"></iframe>

<script>
    let submitted = false;
    document.getElementById('delivery-form').onsubmit = function() { submitted = true; };
    function saveInfo() {
        const id = document.getElementById('user-id').value;
        const camp = document.getElementById('user-camp').value;
        if(id && camp) {
            localStorage.setItem('ryanl_id', id);
            localStorage.setItem('ryanl_camp', camp);
            location.reload();
        } else { alert('아이디와 캠프를 모두 입력해주세요!'); }
    }
    function showSetup() {
        document.getElementById('setup-view').style.display = 'block';
        document.getElementById('main-view').style.display = 'none';
    }
    window.onload = function() {
        const id = localStorage.getItem('ryanl_id');
        const camp = localStorage.getItem('ryanl_camp');
        if(id && camp) {
            document.getElementById('setup-view').style.display = 'none';
            document.getElementById('main-view').style.display = 'block';
            document.getElementById('display-id').innerText = id;
            document.getElementById('display-camp').innerText = camp;
            document.getElementById('form-id').value = id;
            document.getElementById('form-camp').value = camp;
        }
    }
</script>
</body>
</html>
