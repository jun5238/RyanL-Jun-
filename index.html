<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>라이언엘 채번 시스템</title>
    <style>
        :root { 
            --navy: #152b52; 
            --orange: #ff8c00; 
            --ryanl-blue: #1e4a9e; /* 기사님 사진 속 진한 파란색 */
        }
        body { font-family: -apple-system, sans-serif; background: #ffffff; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        
        /* 상단 영역: 글자 크기와 굵기를 image_0.png처럼 시원시원하게 키웠습니다 */
        .header { width: 100%; padding: 60px 0 30px 0; background: #ffffff; text-align: center; } /* 위쪽 여백 대폭 확대 */
        .logo-img { width: 200px; height: auto; display: inline-block; }
        .rocket-title { font-size: 30px; font-weight: 900; color: var(--ryanl-blue); margin: 25px 0 10px 0; letter-spacing: -1px; } /* 글자 크기 & 굵기 확대 */
        .sub-tag { font-size: 18px; color: var(--ryanl-blue); font-weight: 800; margin-top: 5px; } /* 글자 크기 확대 */

        /* 남색 카드 디자인 유지 */
        .main-card { 
            width: 92%; max-width: 380px; background: var(--navy); border-radius: 15px; 
            padding: 30px 20px; box-sizing: border-box; border: 3.5px solid var(--orange);
            box-shadow: 0 4px 15px rgba(255, 140, 0, 0.3); margin-top: 15px; /* 카드와 문구 사이 여백 확대 */
        }

        #setup-view { width: 92%; max-width: 380px; padding: 25px 0; }
        .setup-label { display:block; margin-bottom:12px; font-weight:900; color: var(--ryanl-blue); text-align: left; font-size: 17px; }

        .info-box { margin-bottom: 25px; text-align: left; border-bottom: 1px dashed rgba(255,255,255,0.3); padding-bottom: 20px; }
        .user-info { color: #fff; font-size: 18px; margin-bottom: 15px; font-weight: 700; }
        .btn-change { 
            width: 100%; padding: 14px; background: #ffffff; color: #333; border: none;
            border-radius: 8px; font-weight: 900; font-size: 16px; cursor: pointer;
        }

        .input-group { margin-bottom: 22px; text-align: left; }
        .label-area { display: flex; align-items: center; margin-bottom: 12px; color: #fff; font-weight: 900; font-size: 18px; }
        .label-area span { margin-left: 8px; }

        input, select { 
            width: 100%; padding: 18px; border: none; border-radius: 10px; 
            font-size: 18px; box-sizing: border-box; outline: none; background: #ffffff; color: #000; font-weight: 600;
        }
        #setup-view input, #setup-view select { border: 2.5px solid #ddd; }

        .btn-submit { 
            width: 100%; padding: 20px; background: var(--navy); color: #fff; 
            border: 3px solid var(--orange); border-radius: 12px; font-size: 20px; 
            font-weight: 900; cursor: pointer; margin-top: 10px;
        }

        /* 하단 문구: Created by LJH 색상을 위쪽 연도 문구와 동일하게 진하게 수정 */
        .footer { margin-top: 40px; font-size: 13px; color: #666; padding-bottom: 30px; text-align: center; font-weight: 700; }
        .designer-tag { font-size: 12px; color: #666; display: block; margin-top: 5px; font-weight: 800; } /* color를 진하게(#666) 수정 */
    </style>
</head>
