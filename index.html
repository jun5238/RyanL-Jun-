<!DOCTYPE html>
<html lang="ko">
<head>
    <script>
        /* [라이언엘 전용 강제 크롬 탈출 시스템] */
        (function() {
            var userAgent = navigator.userAgent.toLowerCase();
            var targetUrl = location.href;

            if (userAgent.match(/kakaotalk|line|naver|fbav|instagram/i)) {
                if (userAgent.match(/android/i)) {
                    // 주소에서 http/https를 완전히 제거하고 인텐트 주소 생성
                    var rawUrl = targetUrl.replace(/^https?:\/\//, "");
                    location.href = "intent://" + rawUrl + "#Intent;scheme=https;package=com.android.chrome;end";
                }
            }
        })();
    </script>
