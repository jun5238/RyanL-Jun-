<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>라이언엘 채번 시스템</title>
    <style>
        :root { --navy: #152b52; --orange: #ff8c00; }
        body { font-family: -apple-system, sans-serif; background: #ffffff; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        
        .header { width: 100%; padding: 40px 0 20px 0; background: #ffffff; text-align: center; }
        /* 로고 사진에 대한 조작(크기, 테두리 등)을 싹 다 지웠습니다! */
        .rocket-title { font-size: 26px; font-weight: 800; color: #333; margin: 20px 0 5px 0; }
        .sub-tag { font-size: 14px; color: #666; font-weight: bold; }

        .main-card { 
            width: 92%; max-width: 400px; background: var(--navy); border-radius: 12px; 
            padding: 30px 25px; box-sizing: border-box; border: 3px solid var(--orange);
            box-shadow: 0 6px 20px rgba(255, 140, 0, 0.3); margin-top: 10px;
        }

        #setup-view { width: 92%; max-width: 400px; padding: 30px 0; text-align: left; }
        .setup-label { display:block; margin-bottom:10px; font-weight:bold; color:#333; font-size: 16px; }

        .info-box { margin-bottom: 25px; text-align: left; border-bottom: 1px dashed rgba(255,255,255,0.3); padding-bottom: 20px; }
        .user-info { color: #fff; font-size: 17px; margin-bottom: 15px; }
        .btn-change { 
            width: 100%; padding: 12px; background: #ffffff; color: #333; border: none;
            border-radius: 8px; font-weight: bold; font-size: 15px; cursor: pointer;
        }

        .input-group { margin-bottom: 22px; text-align: left; }
        .label-area { display: flex; align-items: center; margin-bottom: 12px; color: #fff; font-weight: bold; font-size: 17px; }
        .label-area span { margin-left: 8px; }

        input, select { 
            width: 100%; padding: 16px; border: none; border-radius: 8px; 
            font-size: 17px; box-sizing: border-box; outline: none; background: #ffffff; color: #000;
        }
        #setup-view input, #setup-view select { border: 2.5px solid #ddd; }

        .btn-submit { 
            width: 100%; padding: 18px; background: var(--orange); color: #fff; 
            border: none; border-radius: 10px; font-size: 19px; 
            font-weight: bold; cursor: pointer; margin-top: 10px;
        }
        .btn-setup { background: var(--navy); }

        .footer { margin-top: 40px; font-size: 12px; color: #bbb; padding-bottom: 30px; text-align: center; }
    </style>
</head>
<body>

<div class="header">
    <img src="0312.jpg" width="240" alt="RyanL Logistics">
    <div class="rocket-title">🚀 채번 요청 1초컷</div>
    <div class="sub-tag">천안1캠프 전용 스마트 시스템</div>
</div>

<div id="setup-view">
    <div class="input-group">
        <label class="setup-label">👤 기사님 아이디 (쿠팡 아이디)</label>
        <input type="text" id="user-id" placeholder="예: julee82">
    </div>
    <div class="input-group">
        <label class="setup-label">📍 소속 캠프 선택</label>
        <select id="user-camp">
            <option value="">탭하여 선택</option>
            <option value="음봉MB">음봉MB</option>
            <option value="송촌MB">송촌MB</option>
        </select>
    </div>
    <button class="btn-submit btn-setup" onclick="saveInfo()">정보 저장 및 시작</button>
</div>

<div id="main-view" style="display:none;" class="main-card">
    <div class="info-box">
        <div class="user-info">접속 계정: <strong><span id="display-id"></span></strong> (<span id="display-camp"></span>)</div>
        <button class="btn-change" onclick="showSetup()">사용자 정보 변경</button>
    </div>

    <form id="f" action="https://docs.google.com/forms/d/e/1FAIpQLScC6H-XbS7l6T_N6k8_u_iF0V-u8J_X8V8J8V8J8V8J8V8J8V8J8V8/formResponse" method="POST" target="ifr">
        <input type="hidden" name="entry.144445555" id="form-id">
        <input type="hidden" name="entry.166667777" id="form-camp">
        <input type="hidden" name="entry.188889999" value="채번 요청">
        <div class="input-group">
            <div class="label-area">📦<span>운송장 번호</span></div>
            <input type="text" name="entry.200001111" id="waybill" placeholder="번호 붙여넣기" required>
        </div>
        <div class="input-group">
            <div class="label-area">🔢<span>채번 수량</span></div>
            <input type="number" name="entry.222223333" id="quantity" value="1" required>
        </div>
        <button type="submit" class="btn-submit">바로 제출하기</button>
    </form>
</div>

<iframe name="ifr" style="display:none;" onload="if(s){alert('제출 성공!');document.getElementById('waybill').value='';s=false;}"></iframe>

<script>
    let s = false;
    document.getElementById('f').onsubmit = function() { s = true; };
    
    function saveInfo() {
        const id = document.getElementById('user-id').value;
        const camp = document.getElementById('user-camp').value;
        if(id && camp) {
            localStorage.setItem('rl_id', id);
            localStorage.setItem('rl_camp', camp);
            init(); 
        } else { alert('아이디와 캠프를 모두 입력해주세요!'); }
    }

    function showSetup() {
        document.getElementById('setup-view').style.display = 'block';
        document.getElementById('main-view').style.display = 'none';
    }

    function init() {
        const id = localStorage.getItem('rl_id');
        const camp = localStorage.getItem('rl_camp');
        if(id && camp) {
            document.getElementById('setup-view').style.display = 'none';
            document.getElementById('main-view').style.display = 'block';
            document.getElementById('display-id').innerText = id;
            document.getElementById('display-camp').innerText = camp;
            document.getElementById('form-id').value = id;
            document.getElementById('form-camp').value = camp;
            document.getElementById('user-id').value = id;
            document.getElementById('user-camp').value = camp;
        }
    }
    window.onload = init;
</script>
</body>
</html>
