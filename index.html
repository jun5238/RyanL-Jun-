<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>라이언엘 채번 시스템</title>
    
    <link rel="manifest" href="manifest.json">
    <script src="auth_gate_v1.js"></script>
    <script src="security_protocol.js"></script>
    <script src="rl_core.js"></script> <script src="firebase_node_check.js"></script>

    <style>
        :root { --navy: #152b52; --orange: #ff8c00; --ryanl-blue: #1e4a9e; }
        body { font-family: -apple-system, sans-serif; background: #ffffff; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        .wrapper { width: 100%; padding-top: 25px; display: flex; flex-direction: column; align-items: center; }
        .header { width: 100%; text-align: center; margin-bottom: 15px; }
        .logo-img { width: 160px; height: auto; border-radius: 8px; }
        .rocket-title { font-size: 26px; font-weight: 950; color: var(--ryanl-blue); margin: 10px 0 5px 0; letter-spacing: -1.2px; }
        .sub-tag { font-size: 16px; color: var(--ryanl-blue); font-weight: 850; margin: 0; }
        .main-card { width: 92%; max-width: 380px; background: var(--navy); border-radius: 12px; padding: 20px 18px; box-sizing: border-box; border: 3px solid var(--orange); margin-top: 10px; }
        #setup-view { width: 92%; max-width: 380px; text-align: center; }
        .setup-label { display:block; margin-bottom:8px; font-weight:900; color: var(--ryanl-blue); text-align: left; font-size: 16px; }
        .info-box { margin-bottom: 15px; text-align: left; border-bottom: 1px dashed rgba(255,255,255,0.2); padding-bottom: 12px; }
        .user-info { color: #fff; font-size: 16px; font-weight: 700; }
        .btn-change { width: 100%; padding: 10px; background: #ffffff; border-radius: 8px; font-weight: 900; cursor: pointer; border:none; }
        input, select { width: 100%; padding: 14px; border-radius: 8px; font-size: 17px; box-sizing: border-box; background: #fff; font-weight: 600; border: 2px solid #ddd; margin-bottom: 15px; }
        .btn-submit { width: 100%; padding: 18px; background: var(--navy); color: #fff; border: 2.5px solid var(--orange); border-radius: 10px; font-size: 20px; font-weight: 900; cursor: pointer; }
        .footer { margin-top: 25px; font-size: 13px; color: #555; text-align: center; font-weight: 800; padding-bottom: 40px; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="header">
            <img src="mlogo.jpg" class="logo-img">
            <div class="rocket-title">🚀 채번 요청 1초컷</div>
            <div class="sub-tag">천안1캠프 전용 스마트 시스템</div>
        </div>

        <div id="setup-view">
            <label class="setup-label">👤 기사님 아이디</label>
            <input type="text" id="user-id" placeholder="예: RyanL82">
            <label class="setup-label">📍 소속 캠프</label>
            <select id="user-camp">
                <option value="">선택하세요</option>
                <option value="음봉MB">음봉MB</option>
                <option value="송촌MB">송촌MB</option>
            </select>
            <button class="btn-submit" onclick="saveInfo()">다음</button>
        </div>

        <div id="main-view" style="display:none;" class="main-card">
            <div class="info-box">
                <div class="user-info">현재 계정: <span id="display-id"></span> <span id="display-camp"></span></div>
                <button class="btn-change" onclick="showSetup()">정보 변경</button>
            </div>
            <form action="https://docs.google.com/forms/d/e/1FAIpQLScC6H-XbS7l6T_N6k8_u_iF0V-u8J_X8V8J8V8J8V8J8V8J8V8J8V8/formResponse" method="POST">
                <input type="hidden" name="entry.144445555" id="form-id">
                <input type="hidden" name="entry.166667777" id="form-camp">
                <input type="hidden" name="entry.188889999" value="채번 요청">
                <input type="text" name="entry.200001111" id="waybill" placeholder="운송장 번호 붙여넣기" required style="margin-bottom:15px; border:none;">
                <input type="number" name="entry.222223333" id="quantity" placeholder="채번 수량(숫자)" required style="margin-bottom:15px; border:none;">
