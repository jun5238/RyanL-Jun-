<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>라이언엘 채번 시스템</title>
    <style>
        :root { 
            --navy: #152b52; /* 사진 속 그 남색 */
            --point: #ff8c00; /* 오렌지 포인트 */
            --bg: #ffffff; 
        }
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        
        .container { 
            width: 100%; max-width: 400px; background: var(--bg); border-radius: 15px; overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; border: 1px solid #ddd;
        }

        /* 상단 로고 영역 */
        .header { padding: 20px 10px; background: #fff; }
        .logo-img { width: 180px; height: auto; }
        .title-area { margin-top: 10px; }
        .title-text { font-size: 22px; font-weight: 800; color: #333; }
        .sub-text { font-size: 13px; color: #666; margin-top: 5px; }

        /* 사용자 정보 박스 (남색 배경) */
        .info-card { 
            background: var(--navy); margin: 0 15px 20px 15px; border-radius: 10px; padding: 15px;
            color: #fff; border: 2px solid var(--point); 
        }
        .info-card strong { color: #fff; font-size: 16px; }
        .btn-edit { 
            background: #fff; color: #333; border: none; padding: 8px 30px; 
            border-radius: 5px; font-weight: bold; margin-top: 10px; cursor: pointer; width: 100%;
        }

        /* 입력 폼 스타일 */
        .form-area { padding: 0 15px 20px 15px; text-align: left; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #333; font-size: 15px; }
        label i { margin-right: 5px; } /* 아이콘 자리 */

        input, select { 
            width: 100%; padding: 15px; border: 2px solid #ced4da; border-radius: 8px; 
            font-size: 16px; box-sizing: border-box; outline: none; background: #f8f9fa;
        }
        input:focus { border-color: var(--navy); background: #fff; }

        /* 제출 버튼 (사진 속 그 색상) */
        .btn-submit { 
            width: 100%; padding: 18px; background: var(--navy); color: white; border: 2px solid var(--point);
            border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer;
        }

        .footer { padding: 15px; font-size: 11px; color: #aaa; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="https://raw.githubusercontent.com/jun5238/RyanL-Jun-/main/1000003027.jpg" class="logo-img" alt="RyanL">
        <div class="title-area">
            <div class="title-text">🚀 채번 요청 1초컷</div>
            <div class="sub-text">천안1캠프 전용</div>
        </div>
    </div>

    <div id="setup-view" style="padding: 20px;">
        <div class="input-group">
            <label>👤 기사님 아이디</label>
            <input type="text" id="user-id" placeholder="예: julee82">
        </div>
        <div class="input-group">
            <label>📍 소속 캠프 선택</label>
            <select id="user-camp">
                <option value="">탭하여 선택</option>
                <option value="음봉MB">음봉MB</option>
                <option value="송촌MB">송촌MB</option>
            </select>
        </div>
        <button class="btn-submit" onclick="saveInfo()">정보 변경</button>
    </div>

    <div id="main-view" style="display:none;">
        <div class="info-card">
            현재 계정: <strong><span id="display-id"></span> (<span id="display-camp"></span>)</strong>
            <button class="btn-edit" onclick="showSetup()">정보 변경</button>
        </div>

        <div class="form-area">
            <form id="f" action="https://docs.google.com/forms/d/e/1FAIpQLScC6H-XbS7l6T_N6k8_u_iF0V-u8J_X8V8J8V8J8V8J8V8J8V8J8V8/formResponse" method="POST" target="ifr">
                <input type="hidden" name="entry.144445555" id="form-id">
                <input type="hidden" name="entry.166667777" id="form-camp">
                <input type="hidden" name="entry.188889999" value="채번 요청">

                <div class="input-group">
                    <label>📦 운송장 번호</label>
                    <input type="text" name="entry.200001111" id="waybill" placeholder="복사한 운송장 붙여넣기" required>
                </div>
                
                <div class="input-group">
                    <label>🔢 채번 수량</label>
                    <input type="number" name="entry.222223333" id="quantity" placeholder="숫자만 입력 (예: 1)" required>
                </div>

                <button type="submit" class="btn-submit">바로 제출하기</button>
            </form>
        </div>
    </div>
    <div class="footer">© RYANL LOGISTICS SYSTEM</div>
</div>

<iframe name="ifr" style="display:none;" onload="if(s){alert('제출 완료!');document.getElementById('waybill').value='';document.getElementById('quantity').value='';}"></iframe>

<script>
    let s = false;
    document.getElementById('f').onsubmit = function() { s = true; };
    function saveInfo() {
        const id = document.getElementById('user-id').value;
        const camp = document.getElementById('user-camp').value;
        if(id && camp) {
            localStorage.setItem('rl_id', id);
            localStorage.setItem('rl_camp', camp);
            location.reload();
        } else { alert('정보를 모두 입력해주세요!'); }
    }
    function showSetup() {
        document.getElementById('setup-view').style.display = 'block';
        document.getElementById('main-view').style.display = 'none';
    }
    window.onload = function() {
        const id = localStorage.getItem('rl_id');
        const camp = localStorage.getItem('rl_camp');
        if(id && camp) {
            document.getElementById('setup-view').style.display = 'none';
            document.getElementById('main-view').style.display = 'block';
            document.getElementById('display-id').innerText = id;
            document.getElementById('display-camp').innerText = camp;
            document.getElementById('form-id').value = id;
            document.getElementById('form-camp').value = camp;
        }
    }
</script>
</body>
</html>
