<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>라이언엘 채번 시스템</title>
    <style>
        :root { --navy: #152b52; --orange: #ff8c00; }
        body { font-family: -apple-system, sans-serif; background: #ffffff; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        
        .header { width: 100%; padding: 40px 0 20px 0; background: #ffffff; text-align: center; }
        .logo-img { max-width: 240px; height: auto; display: inline-block; border-radius: 5px; } 
        .rocket-title { font-size: 26px; font-weight: 800; color: #333; margin: 20px 0 5px 0; }
        .sub-tag { font-size: 14px; color: #666; font-weight: bold; }

        .main-card { 
            width: 92%; max-width: 400px; background: var(--navy); border-radius: 12px; 
            padding: 30px 25px; box-sizing: border-box; border: 3px solid var(--orange);
            box-shadow: 0 6px 20px rgba(255, 140, 0, 0.3); margin-top: 10px;
        }

        #setup-view { width: 92%; max-width: 400px; padding: 30px 0; text-align: left; }
        .setup-label { display:block; margin-bottom:10px; font-weight:bold; color:#333; font-size: 16px; }

        .info-box { margin-bottom: 25px; text-align: left; border-bottom: 1px dashed rgba(255,255,255,0.3); padding-bottom: 20px; }
        .user-info { color: #fff; font-size: 17px; margin-bottom: 15px; }
        .btn-change { 
            width: 100%; padding: 12px; background: #ffffff; color: #333; border: none;
            border-radius: 8px; font-weight: bold; font-size: 15px; cursor: pointer;
        }

        .input-group { margin-bottom: 22px; text-align: left; }
        .label-area { display: flex; align-items: center; margin-bottom: 12px; color: #fff; font-weight: bold; font-size: 17px; }
        .label-area span { margin-left: 8px; }

        input, select { 
            width: 100%; padding: 16px; border: none; border-radius: 8px; 
            font-size: 17px; box-sizing: border-box; outline: none; background: #ffffff; color: #000;
        }
        #setup-view input, #setup-view select { border: 2.5px solid #ddd; }
