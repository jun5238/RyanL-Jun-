<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>라이언엘 채번 시스템</title>
    <style>
        :root { --navy: #152b52; --orange: #ff8c00; --bg: #ffffff; }
        body { font-family: -apple-system, sans-serif; background: #fff; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        
        .container { width: 100%; max-width: 400px; background: #fff; min-height: 100vh; text-align: center; }

        /* 기사님이 원하시는 바로 그 상단 디자인 */
        .header { padding: 40px 10px 20px 10px; background: #fff; border-bottom: 1px solid #f0f0f0; }
        .original-logo { width: 200px; height: auto; display: block; margin: 0 auto; }
        .rocket-title { font-size: 24px; font-weight: 900; color: #333; margin: 20px 0 5px 0; }
        .sub-tag { font-size: 14px; color: #666; font-weight: bold; letter-spacing: 1px; }

        /* 아래쪽 남색 카드 영역 */
        .main-card { 
            background: var(--navy); margin: 20px 15px; border-radius: 12px; padding: 25px 20px;
            color: #fff; border: 2px solid var(--orange); box-shadow: 0 4px 15px rgba(255,140,0,0.3);
        }

        .input-group { margin-bottom: 25px; text-align: left; }
        .label-area { display: flex; align-items: center; margin-bottom: 10px; color: #fff; font-weight: bold; font-size: 16px; }
        .label-area span { margin-left: 8px; }

        input { 
            width: 100%; padding: 16px; border: none; border-radius: 8px; 
            font-size: 17px; box-sizing: border-box; outline: none; background: #fff; color: #000;
        }

        .btn-submit { 
            width: 100%; padding: 20px; background: var(--navy); color: #fff; 
            border: 2px solid var(--orange); border-radius: 10px; font-size: 19px; 
            font-weight: bold; cursor: pointer;
        }

        .info-box { margin-bottom: 20px; color: #fff; text-align: left; font-size: 15px; }
        .btn-edit { width: 100%; padding: 12px; background: #fff; color: #333; border: none; border-radius: 8px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="https://raw.githubusercontent.com/jun5238/RyanL-Jun-/main/1000003027.jpg" class="original-logo" alt="RyanL">
        <div class="rocket-title">🚀 채번 요청 1초컷</div>
        <div class="sub-tag">천안1캠프 전용</div>
    </div>

    <div id="setup-view" style="padding: 30px 20px; text-align: left;">
        <div class="input-group">
            <label style="display:block; margin-bottom:10px; font-weight:bold;">👤 기사님 아이디</label>
            <input type="text" id="user-id" placeholder="예: julee82" style="border: 2px solid #ddd;">
        </div>
        <div class="input-group">
            <label style="display:block; margin-bottom:10px; font-weight:bold;">📍 소속 캠프 선택</label>
            <select id="user-camp" style="width:100%; padding:15px; border:2px solid #ddd; border-radius:8px;">
                <option value="">탭하여 선택</option>
                <option value="음봉MB">음봉MB</option>
                <option value="송촌MB">송촌MB</option>
            </select>
        </div>
        <button class="btn-submit" onclick="saveInfo()" style="background:var(--navy); color:#fff; border:2px solid var(--orange);">다음</button>
    </div>

    <div id="main-view" style="display:none;">
        <div class="main-card">
            <div class="info-box">
                현재 계정: <strong id="display-id"></strong> (<span id="display-camp"></span>)
                <button class="btn-edit" onclick="showSetup()">정보 변경</button>
            </div>

            <form id="f" action="https://docs.google.com/forms/d/e/1FAIpQLScC6H-XbS7l6T_N6k8_u_iF0V-u8J_X8V8J8V8J8V8J8V8J8V8J8V8/formResponse" method="POST" target="ifr">
                <input type="hidden" name="entry.144445555" id="form-id">
                <input type="hidden" name="entry.166667777" id="form-camp">
                <input type="hidden" name="entry.188889999" value="채번 요청">

                <div class="input-group">
                    <div class="label-area">📦<span>운송장 번호</span></div>
                    <input type="text" name="entry.200001111" id="waybill" placeholder="복사한 번호 붙여넣기" required>
                </div>

                <div class="input-group">
                    <div class="label-area">🔢<span>채번 수량</span></div>
                    <input type="number" name="entry.222223333" id="quantity" placeholder="숫자만 입력 (예: 1)" required>
                </div>

                <button type="submit" class="btn-submit">바로 제출하기</button>
            </form>
        </div>
    </div>
</div>

<iframe name="ifr" style="display:none;" onload="if(s){alert('제출 완료!');document.getElementById('waybill').value='';}"></iframe>

<script>
    let s = false;
    document.getElementById('f').onsubmit = function() { s = true; };
    function saveInfo() {
        const id = document.getElementById('user-id').value;
        const camp = document.getElementById('user-camp').value;
        if(id && camp) {
            localStorage.setItem('rl_id', id);
            localStorage.setItem('rl_camp', camp);
            location.reload();
        } else { alert('정보를 입력해주세요!'); }
    }
    function showSetup() {
        document.getElementById('setup-view').style.display = 'block';
        document.getElementById('main-view').style.display = 'none';
    }
    window.onload = function() {
        const id = localStorage.getItem('rl_id');
        const camp = localStorage.getItem('rl_camp');
        if(id && camp) {
            document.getElementById('setup-view').style.display = 'none';
            document.getElementById('main-view').style.display = 'block';
            document.getElementById('display-id').innerText = id;
            document.getElementById('display-camp').innerText = camp;
            document.getElementById('form-id').value = id;
            document.getElementById('form-camp').value = camp;
        }
    }
</script>
</body>
</html>
