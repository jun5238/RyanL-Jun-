<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>라이언엘 채번 시스템</title>
    <style>
        :root { --navy: #152b52; --orange: #ff8c00; }
        body { font-family: -apple-system, sans-serif; background: #ffffff; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        
        /* 상단 영역: 기사님 사진 속 속도감 로고 데이터 배치 */
        .header { width: 100%; padding: 40px 0 20px 0; background: #ffffff; text-align: center; }
        .logo-img { width: 220px; height: auto; display: inline-block; }
        .rocket-title { font-size: 24px; font-weight: 800; color: #333; margin: 20px 0 5px 0; }
        .sub-tag { font-size: 14px; color: #666; font-weight: bold; }

        /* 남색 카드 디자인 유지 */
        .main-card { 
            width: 92%; max-width: 380px; background: var(--navy); border-radius: 12px; 
            padding: 25px 20px; box-sizing: border-box; border: 2.5px solid var(--orange);
            box-shadow: 0 4px 15px rgba(255, 140, 0, 0.3); margin-top: 10px;
        }

        #setup-view { width: 92%; max-width: 380px; padding: 20px 0; }
        .setup-label { display:block; margin-bottom:10px; font-weight:bold; color:#333; text-align: left; }

        .info-box { margin-bottom: 25px; text-align: left; }
        .user-info { color: #fff; font-size: 16px; margin-bottom: 12px; }
        .btn-change { 
            width: 100%; padding: 12px; background: #ffffff; color: #333; border: none;
            border-radius: 8px; font-weight: bold; font-size: 15px; cursor: pointer;
        }

        .input-group { margin-bottom: 22px; text-align: left; }
        .label-area { display: flex; align-items: center; margin-bottom: 10px; color: #fff; font-weight: bold; font-size: 16px; }
        .label-area span { margin-left: 8px; }

        input, select { 
            width: 100%; padding: 16px; border: none; border-radius: 8px; 
            font-size: 17px; box-sizing: border-box; outline: none; background: #ffffff; color: #000;
        }
        #setup-view input, #setup-view select { border: 2px solid #ddd; }

        .btn-submit { 
            width: 100%; padding: 18px; background: var(--navy); color: #fff; 
            border: 2px solid var(--orange); border-radius: 10px; font-size: 18px; 
            font-weight: bold; cursor: pointer; margin-top: 10px;
        }

        /* 하단 문구 스타일: 'Created by LJH' 색상을 진하게 수정 */
        .footer { margin-top: 30px; font-size: 11px; color: #bbb; padding-bottom: 20px; text-align: center; line-height: 1.6; }
        .designer-tag { font-size: 9px; color: #bbb; display: block; margin-top: 4px; } /* color를 진하게(#bbb) 수정 */
    </style>
</head>
