<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>라이언엘 채번 시스템</title>
    <style>
        :root { 
            --navy: #152b52; /* 사진 속 네이비 */
            --orange: #ff8c00; /* 포인트 오렌지 */
        }
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        
        .container { 
            width: 100%; max-width: 400px; background: #fff; min-height: 100vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.1); text-align: center;
        }

        /* 상단 영역 (사진과 동일하게 구현) */
        .header { padding: 30px 10px 20px 10px; background: #fff; }
        .logo-img { width: 200px; height: auto; }
        .rocket-title { font-size: 24px; font-weight: 900; color: #333; margin: 15px 0 5px 0; }
        .sub-tag { font-size: 13px; color: #666; font-weight: bold; letter-spacing: 1px; }

        /* 사용자 정보 영역 (네이비 바탕 + 오렌지 테두리) */
        .info-card { 
            background: var(--navy); margin: 0 20px 25px 20px; border-radius: 12px; padding: 20px;
            color: #fff; border: 2px solid var(--orange); box-shadow: 0 4px 10px rgba(255,140,0,0.2);
        }
        .info-card strong { font-size: 18px; display: block; margin-bottom: 10px; }
        .btn-edit { 
            background: #fff; color: #333; border: none; padding: 10px; border-radius: 6px; 
            font-weight: bold; cursor: pointer; width: 100%; font-size: 15px;
        }

        /* 입력 폼 영역 */
        .form-area { padding: 0 25px; text-align: left; }
        .input-group { margin-bottom: 22px; }
        label { display: block; margin-bottom: 10px; font-weight: bold; color: #444; font-size: 16px; }
        
        input, select { 
            width: 100%; padding: 16px; border: 2px solid var(--orange); border-radius: 10px; 
            font-size: 16px; box-sizing: border-box; outline: none; background: #fff;
        }

        /* 제출 버튼 (네이비 배경 + 오렌지 강조) */
        .btn-submit { 
            width: 100%; padding: 20px; background: var(--navy); color: white; 
            border: 2px solid var(--orange); border-radius: 12px; font-size: 19px; 
            font-weight: bold; cursor: pointer; margin-top: 10px;
        }

        .footer { padding: 30px 15px; font-size: 11px; color: #bbb; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="https://raw.githubusercontent.com/jun5238/RyanL-Jun-/main/1000003027.jpg" class="logo-img" alt="RyanL">
        <div class="rocket-title">🚀 채번 요청 1초컷</div>
        <div class="sub-tag">천안1캠프 전용 스마트 시스템</div>
    </div>

    <div id="setup-view" style="padding: 0 25px;">
        <div class="input-group" style="text-align:left;">
            <label>👤 기사님 아이디</label>
            <input type="text" id="user-id" placeholder="예: julee82">
        </div>
        <div class="input-group" style="text-align:left;">
            <label>📍 소속 캠프 선택</label>
            <select id="user-camp">
                <option value="">탭하여 선택</option>
                <option value="음봉MB">음봉MB</option>
                <option value="송촌MB">송촌MB</option>
            </select>
        </div>
        <button class="btn-submit" onclick="saveInfo()">다음</button>
    </div>

    <div id="main-view" style="display:none;">
        <div class="info-card">
            <strong><span id="display-id"></span> 기사님 (<span id="display-camp"></span>)</strong>
            <button class="btn-edit" onclick="showSetup()">정보 변경</button>
        </div>

        <div class="form-area">
            <form id="f" action="https://docs.google.com/forms/d/e/1FAIpQLScC6H-XbS7l6T_N6k8_u_iF0V-u8J_X8V8J8V8J8V8J8V8J8V8J8V8/formResponse" method="POST" target="ifr">
                <input type="hidden" name="entry.144445555" id="form-id">
                <input type="hidden" name="entry.166667777" id="form-camp">
                <input type="hidden" name="entry.188889999" value="채번 요청">
                
                <div class="input-group">
                    <label>📦 운송장 번호</label>
                    <input type="text" name="entry.200001111" id="waybill" placeholder="복사한 번호 붙여넣기" required>
                </div>
                
                <div class="input-group">
                    <label>🔢 채번 수량</label>
                    <input type="number" name="entry.222223333" id="quantity" placeholder="숫자만 입력 (예: 1)" required>
                </div>

                <button type="submit" class="btn-submit">바로 제출하기</button>
            </form>
        </div>
    </div>
    <div class="footer">© 2026 RYANL LOGISTICS SYSTEM</div>
</div>

<iframe name="ifr" style="display:none;" onload="if(s){alert('제출 완료!');document.getElementById('waybill').value='';}"></iframe>

<script>
    let s = false;
    document.getElementById('f').onsubmit = function() { s = true; };
    function saveInfo() {
        const id = document.getElementById('user-id').value;
        const camp = document.getElementById('user-camp').value;
        if(id && camp) {
            localStorage.setItem('rl_id', id);
            localStorage.setItem('rl_camp', camp);
            location.reload();
        } else { alert('아이디와 캠프를 모두 입력해주세요!'); }
    }
    function showSetup() {
        document.getElementById('setup-view').style.display = 'block';
        document.getElementById('main-view').style.display = 'none';
    }
    window.onload = function() {
        const id = localStorage.getItem('rl_id');
        const camp = localStorage.getItem('rl_camp');
        if(id && camp) {
            document.getElementById('setup-view').style.display = 'none';
            document.getElementById('main-view').style.display = 'block';
            document.getElementById('display-id').innerText = id;
            document.getElementById('display-camp').innerText = camp;
            document.getElementById('form-id').value = id;
            document.getElementById('form-camp').value = camp;
        }
    }
</script>
</body>
</html>
