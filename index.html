<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>RyanL Logistics</title>
    <style>
        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
    <script>
        var t = new Date().getTime();
        document.write('<link rel="stylesheet" href="style.css?v=' + t + '">');
    </script>
</head>
<body style="margin:0; padding:0; background-color:#f4f4f9; font-family:sans-serif;">

    <div id="splash-screen" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#1c2541; display:flex; align-items:center; justify-content:center; z-index:9999; transition:opacity 0.5s;">
        <h1 style="color:#ff8c00; font-size:28px; font-weight:900;">RyanL Logistics</h1>
    </div>

    <div id="setup-view" style="display:none; padding:20px; max-width:400px; margin:40px auto;">
        <div style="text-align:center; margin-bottom:30px;">
            <h2 style="color:#1c2541; margin:0;">기사님 로그인</h2>
        </div>
        <input type="text" id="user-id" placeholder="아이디" style="width:100%; padding:16px; margin-bottom:15px; border:1px solid #ccc; border-radius:8px; box-sizing:border-box; font-size:16px;">
        <select id="user-camp" style="width:100%; padding:16px; margin-bottom:25px; border:1px solid #ccc; border-radius:8px; box-sizing:border-box; font-size:16px; background-color:#fff;">
            <option value="선택하세요">선택하세요</option>
            <option value="천안1캠프">천안1캠프</option>
        </select>
        <button class="btn-submit" onclick="saveInfo()" style="width:100%; padding:16px; background:#1c2541; color:#fff; border:none; border-radius:8px; font-weight:bold; font-size:17px;">로그인</button>
    </div>

    <div id="admin-login-view" style="display:none; padding:20px; background:#111; color:#fff; height:100vh; box-sizing:border-box;">
        <div style="text-align:center; margin-bottom:40px; padding-top:40px;">
            <h2 style="color:#ff8c00; margin:0;">관리자 보안 인증</h2>
        </div>
        <input type="password" id="admin-pw" placeholder="비밀번호" style="width:100%; padding:16px; margin-bottom:20px; border:none; border-radius:8px; box-sizing:border-box; font-size:16px;">
        <button onclick="checkAdminPw()" style="width:100%; padding:16px; background:#ff8c00; color:#fff; border:none; border-radius:8px; font-weight:bold; font-size:17px; margin-bottom:15px;">접속하기</button>
        <button onclick="cancelAdmin()" style="width:100%; padding:16px; background:#555; color:#fff; border:none; border-radius:8px; font-weight:bold; font-size:17px;">취소</button>
    </div>

    <div id="admin-dashboard-view" style="display:none; padding:20px; background:#1c2541; min-height:100vh; box-sizing:border-box;">
        <div style="text-align:center; margin-bottom:20px; padding-top:20px;">
            <h2 style="color:#ff8c00; margin:0;">사령부 대시보드</h2>
        </div>
        <div id="admin-list-content"></div>
        <button onclick="showSetup()" style="width:100%; padding:16px; background:#ff3b30; color:#fff; border:none; border-radius:8px; font-weight:bold; font-size:17px; margin-top:30px;">로그아웃</button>
    </div>

    <div id="main-view" style="display:none; padding:20px; max-width:400px; margin:20px auto;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px; padding-bottom:15px; border-bottom:2px solid #ddd;">
            <div style="font-size:16px; color:#333;">
                <span id="display-camp" style="font-weight:900; color:#ff8c00;"></span> - <span id="display-id" style="font-weight:900;"></span> 기사님
            </div>
            <button onclick="showSetup()" style="padding:8px 15px; background:#e0e0e0; color:#333; border:none; border-radius:5px; font-size:14px; font-weight:bold;">정보변경</button>
        </div>
        <input type="hidden" id="form-id">
        <input type="hidden" id="form-camp">
        <input type="text" id="waybill" placeholder="운송장 번호" style="width:100%; padding:16px; margin-bottom:15px; border:1px solid #ccc; border-radius:8px; box-sizing:border-box; font-size:16px;">
        <input type="number" id="quantity" placeholder="수량" style="width:100%; padding:16px; margin-bottom:25px; border:1px solid #ccc; border-radius:8px; box-sizing:border-box; font-size:16px;">
        <button onclick="submitForm()" style="width:100%; padding:16px; background:#1c2541; color:#fff; border:none; border-radius:8px; font-weight:bold; font-size:17px;">바로 제출하기</button>
    </div>

    <div id="custom-alert-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); align-items:center; justify-content:center; z-index:9999;">
        <div style="background:#fff; width:85%; max-width:320px; border-radius:15px; overflow:hidden; box-shadow:0 10px 20px rgba(0,0,0,0.2); text-align:center; animation:popIn 0.3s ease-out;">
            <div style="padding:20px; font-size:18px; font-weight:bold; color:#1c2541;">
                🚨<br>미승인 아이디입니다
            </div>
            <div style="padding:0 20px 20px; font-size:14px; color:#333; text-align:left; line-height:1.6;">
                관리자에게 승인을 요청하세요.<br><br>
                <b style="color:#ff8c00;">[승인 요청 양식]</b><br>
                • 아이디 :<br>
                • 성함 :<br>
                • 업체명 :<br><br>
                👉 위 내용을 cndrone@naver.com 으로 보내주세요.<br><br>
                <span style="color:#ff3b30; font-size:13px; font-weight:bold;">※ 허위 정보로 신청 시 승인이 거절될 수 있습니다.</span>
            </div>
            <div style="padding:0 20px 20px;">
                <button onclick="document.getElementById('custom-alert-overlay').style.display='none'" style="width:100%; padding:12px; background:#1c2541; color:#fff; border:none; border-radius:8px; font-weight:bold; font-size:16px;">확인</button>
            </div>
        </div>
    </div>

    <script>
        var t2 = new Date().getTime();
        document.write('<script src="vip_list.js?v=' + t2 + '"><\/script>');
        document.write('<script src="rl_core.js?v=' + t2 + '"><\/script>');
    </script>
</body>
</html>
