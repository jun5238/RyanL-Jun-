<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>운송장 카메라 스캔</title>
    <script src="https://cdn.jsdelivr.net/npm/javascript-barcode-reader"></script>
    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #121212; color: white;
            font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .container { width: 90%; max-width: 360px; text-align: center; }
        h2 { font-size: 18px; margin-bottom: 25px; color: #ff8c00; }
        
        .scan-btn {
            width: 100%; padding: 20px; background-color: #ff8c00;
            color: white; border: none; border-radius: 12px;
            font-size: 18px; font-weight: bold; cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 140, 0, 0.4);
            margin-bottom: 20px;
        }
        .result-box {
            padding: 15px; background: #1e1e1e;
            border: 1px solid #333; border-radius: 8px; font-size: 14px;
        }
        .btn-copy {
            width: 100%; padding: 12px; margin-top: 10px;
            background-color: #2ecc71; color: white; border: none;
            border-radius: 8px; font-size: 16px; font-weight: bold;
            cursor: pointer; display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>🚀 채번 시스템 카메라 스캔</h2>
        
        <button class="scan-btn" onclick="document.getElementById('camera-input').click();">📸 운송장 촬영하기</button>
        <input type="file" id="camera-input" accept="image/*" capture="environment" style="display: none;" onchange="processImage(this)">

        <div class="result-box">
            <span style="color:#aaa; font-size:12px;">[ 인식된 운송장 번호 ]</span>
            <strong id="scan-result" style="color: #f1c40f; font-size: 20px; display: block; margin: 8px 0;">-</strong>
            <button id="copy-btn" class="btn-copy" onclick="copyToClipboard()">📋 번호 복사하기</button>
        </div>
    </div>

    <div id="custom-alert-box" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:999999; justify-content:center; align-items:center;">
        <div style="background:#fff; width:80%; max-width:300px; border-radius:15px; padding:25px; text-align:center; box-shadow:0 10px 25px rgba(0,0,0,0.3);">
            <div style="font-size:30px; margin-bottom:10px;">⚠️</div>
            <div id="custom-alert-msg" style="font-size:15px; font-weight:bold; color:#333; line-height:1.5; margin-bottom:20px;">메시지 내용</div>
            <button onclick="document.getElementById('custom-alert-box').style.display='none'" style="width:100%; padding:12px; background:#ff8c00; color:#fff; border:none; border-radius:10px; font-weight:900; cursor:pointer;">확인</button>
        </div>
    </div>

    <script>
        let currentNumber = "";

        function myAlert(message) {
            const alertBox = document.getElementById('custom-alert-box');
            const alertMsg = document.getElementById('custom-alert-msg');
            if (alertBox && alertMsg) {
                alertMsg.innerText = message;
                alertBox.style.display = 'flex';
            } else {
                alert(message);
            }
        }

        function processImage(input) {
            if (!input.files || !input.files[0]) return;
            
            const file = input.files[0];
            const reader = new FileReader();
            
            document.getElementById('scan-result').innerText = "분석 중...";
            
            reader.onload = function(e) {
                const img = new Image();
                img.src = e.target.result;
                img.onload = function() {
                    // 이미지에서 바코드 추출 시도
                    javascriptBarcodeReader({
                        image: img,
                        barcode: 'code-128' // 쿠팡 운송장 기본 규격
                    }).then(result => {
                        currentNumber = result;
                        document.getElementById('scan-result').innerText = result;
                        document.getElementById('copy-btn').style.display = 'block';
                    }).catch(err => {
                        // 128 실패 시 다른 규격 재시도
                        javascriptBarcodeReader({
                            image: img,
                            barcode: 'code-39'
                        }).then(result => {
                            currentNumber = result;
                            document.getElementById('scan-result').innerText = result;
                            document.getElementById('copy-btn').style.display = 'block';
                        }).catch(e => {
                            document.getElementById('scan-result').innerText = "인식 실패 (다시 촬영)";
                            myAlert("바코드를 흐리지 않게 수평으로 다시 찍어주세요!");
                        });
                    });
                };
            };
            reader.readAsDataURL(file);
        }

        function copyToClipboard() {
            if(!currentNumber) return;
            navigator.clipboard.writeText(currentNumber).then(() => {
                myAlert("복사 완료! 이제 원래 채번 창에 붙여넣으세요! 🔥\n\n번호: " + currentNumber);
            }).catch(err => {
                myAlert("복사 실패! 번호를 직접 입력해 주세요: " + currentNumber);
            });
        }
    </script>
</body>
</html>
