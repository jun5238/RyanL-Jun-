<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>바코드 스캔 시스템</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #121212; color: white;
            font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .container { width: 95%; max-width: 360px; text-align: center; }
        h2 { font-size: 18px; margin-bottom: 15px; color: #ff8c00; }
        #reader { width: 100%; background: #000; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .result-box {
            margin-top: 15px; padding: 15px; background: #1e1e1e;
            border: 1px solid #333; border-radius: 8px; font-size: 14px;
        }
        .btn-copy {
            width: 100%; padding: 14px; margin-top: 10px;
            background-color: #2ecc71; color: white; border: none;
            border-radius: 8px; font-size: 18px; font-weight: bold;
            cursor: pointer; display: none; box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>📸 고해상도 후면 고속 스캔</h2>
        <div id="reader"></div>
        
        <div class="result-box">
            <span style="color:#aaa; font-size:12px;">[ 인식된 운송장 번호 ]</span>
            <strong id="scan-result" style="color: #f1c40f; font-size: 24px; display: block; margin: 8px 0;">-</strong>
            <button id="copy-btn" class="btn-copy" onclick="copyToClipboard()">📋 번호 복사하기</button>
        </div>
    </div>

    <div id="custom-alert-box" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:999999; justify-content:center; align-items:center;">
        <div style="background:#fff; width:80%; max-width:300px; border-radius:15px; padding:25px; text-align:center; box-shadow:0 10px 25px rgba(0,0,0,0.3);">
            <div style="font-size:30px; margin-bottom:10px;">⚠️</div>
            <div id="custom-alert-msg" style="font-size:15px; font-weight:bold; color:#333; line-height:1.5; margin-bottom:20px;">메시지 내용</div>
            <button onclick="document.getElementById('custom-alert-box').style.display='none'" style="width:100%; padding:12px; background:#ff8c00; color:#fff; border:none; border-radius:10px; font-weight:900; cursor:pointer;">확인</button>
        </div>
    </div>

    <script>
        let currentNumber = "";

        function myAlert(message) {
            const alertBox = document.getElementById('custom-alert-box');
            const alertMsg = document.getElementById('custom-alert-msg');
            if (alertBox && alertMsg) {
                alertMsg.innerText = message;
                alertBox.style.display = 'flex';
            } else {
                alert(message);
            }
        }

        window.onload = function() {
            Html5Qrcode.getCameras().then(cameras => {
                if (cameras && cameras.length > 0) {
                    const html5QrCode = new Html5Qrcode("reader");
                    html5QrCode.start(
                        // facingMode를 정확히 'exact'로 걸어서 무조건 뒷면 카메라만 강제로 작동시킵니다!
                        { facingMode: { exact: "environment" } }, 
                        { 
                            fps: 30, 
                            qrbox: { width: 260, height: 260 },
                            videoConstraints: {
                                facingMode: { exact: "environment" },
                                width: { ideal: 1920 },
                                height: { ideal: 1080 }
                            }
                        },
                        onScanSuccess,
                        onScanFailure
                    ).catch(err => {
                        // 만약 에러나면 차선책으로 일반 후면 카메라로 재구동
                        html5QrCode.start(
                            { facingMode: "environment" },
                            { fps: 30, qrbox: { width: 260, height: 260 } },
                            onScanSuccess,
                            onScanFailure
                        ).catch(e => console.error(e));
                    });
                }
            }).catch(err => {
                console.error(err);
            });
        };

        function onScanSuccess(decodedText) {
            let processedText = decodedText.trim();
            
            if (processedText.includes('|')) {
                processedText = processedText.split('|')[0];
            }
            
            processedText = processedText.replace(/[^0-9]/g, '');

            if (processedText.length > 0) {
                currentNumber = processedText;
                document.getElementById('scan-result').innerText = processedText;
                document.getElementById('copy-btn').style.display = 'block'; 
            }
        }

        function onScanFailure(error) {}

        function copyToClipboard() {
            if(!currentNumber) return;
            navigator.clipboard.writeText(currentNumber).then(() => {
                myAlert("운송장 번호가 성공적으로 복사되었습니다! 🚀\n\n▶ 번호: " + currentNumber);
            }).catch(err => {
                myAlert("복사에 실패했습니다. 번호를 직접 복사해 주세요: " + currentNumber);
            });
        }
    </script>
</body>
</html>
