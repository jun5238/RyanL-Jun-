    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyARk9-4wKQ_53Yw2p1_bHDa1U4igP7sUfI",
            authDomain: "ryanl-logistics.firebaseapp.com",
            databaseURL: "https://ryanl-logistics-default-rtdb.firebaseio.com",
            projectId: "ryanl-logistics",
            storageBucket: "ryanl-logistics.firebasestorage.app",
            messagingSenderId: "711688730396",
            appId: "1:711688730396:web:55ed4ffa98a0f5bbe86cd9"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();

        function formatPhoneNumber(input) {
            let val = input.value.replace(/[^0-9]/g, '');
            if (val.length > 3 && val.length <= 7) {
                val = val.substring(0,3) + '-' + val.substring(3);
            } else if (val.length > 7) {
                val = val.substring(0,3) + '-' + val.substring(3,7) + '-' + val.substring(7,11);
            }
            input.value = val;
        }

        function sendApprovalRequest() {
            var reqId = document.getElementById('req-id').value.trim();
            var reqCamp = document.getElementById('user-camp').value;
            var reqName = document.getElementById('req-name').value.trim();
            var reqCompany = document.getElementById('req-company').value.trim();
            var reqPhone = document.getElementById('req-phone').value.trim();
            var consent = document.getElementById('privacy-consent').checked;

            if(!reqId || !reqName || !reqCompany || !reqPhone) {
                myAlert("아이디, 성함, 업체명, 연락처를 모두 입력해주세요!");
                return;
            }
            if(!consent) {
                myAlert("개인정보 수집 및 이용 동의가 필요합니다.");
                return;
            }

            db.ref("승인대기방/" + reqId).set({
                id: reqId,
                camp: reqCamp,
                name: reqName,
                company: reqCompany,
                phone: reqPhone,
                status: "대기중",
                timestamp: new Date().getTime()
            }).then(() => {
                document.getElementById('custom-alert-overlay').style.display = 'none';
                document.getElementById('approval-success-overlay').style.display = 'flex';
            }).catch((error) => {
                myAlert("오류 발생: " + error.message);
            });
        }

        db.ref("승인대기방").on('value', (snapshot) => {
            const badge = document.getElementById('admin-badge');
            const data = snapshot.val();
            if (data) {
                const count = Object.keys(data).length;
                badge.innerText = count;
                badge.style.display = 'block';
            } else {
                badge.style.display = 'none';
            }
        });
    </script>
