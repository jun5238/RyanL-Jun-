    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyARk9-4wKQ_53Yw2p1_bHDa1U4igP7sUfI",
            authDomain: "ryanl-logistics.firebaseapp.com",
            databaseURL: "https://ryanl-logistics-default-rtdb.firebaseio.com",
            projectId: "ryanl-logistics",
            storageBucket: "ryanl-logistics.firebasestorage.app",
            messagingSenderId: "711688730396",
            appId: "1:711688730396:web:55ed4ffa98a0f5bbe86cd9"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();

        function formatPhoneNumber(input) {
            let val = input.value.replace(/[^0-9]/g, '');
            if (val.length > 3 && val.length <= 7) {
                val = val.substring(0,3) + '-' + val.substring(3);
            } else if (val.length > 7) {
                val = val.substring(0,3) + '-' + val.substring(3,7) + '-' + val.substring(7,11);
            }
            input.value = val;
        }

        function sendApprovalRequest() {
            var reqId = document.getElementById('req-id').value.trim();
            var reqCamp = document.getElementById('user-camp').value;
            var reqName = document.getElementById('req-name').value.trim();
            var reqCompany = document.getElementById('req-company').value.trim();
            var reqPhone = document.getElementById('req-phone').value.trim();
            var consent = document.getElementById('privacy-consent').checked;

            if(!reqId || !reqName || !reqCompany || !reqPhone) {
                myAlert("아이디, 성함, 업체명, 연락처를 모두 입력해주세요!");
                return;
            }
            if(!consent) {
                myAlert("개인정보 수집 및 이용 동의가 필요합니다.");
                return;
            }

            db.ref("승인대기방/" + reqId).set({
                id: reqId,
                camp: reqCamp,
                name: reqName,
                company: reqCompany,
                phone: reqPhone,
                status: "대기중",
                timestamp: new Date().getTime()
            }).then(() => {
                document.getElementById('custom-alert-overlay').style.display = 'none';
                document.getElementById('approval-success-overlay').style.display = 'flex';
            }).catch((error) => {
                myAlert("오류 발생: " + error.message);
            });
        }
    </script>

<body>
    <div id="splash-screen">
        <img src="loading.jpg" class="splash-logo" alt="RyanL Loading">
        <div class="splash-text">Loading.....</div>
    </div>

    <div id="success-overlay" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.6); z-index:100000; justify-content:center; align-items:center;">

            <div style="font-size:45px; margin-bottom:15px;">✅</div>
            <div style="font-size:20px; font-weight:900; color:#152b52;">전송 완료!</div>
            <button onclick="document.getElementById('success-overlay').style.display='none'" style="width:100%; padding:14px; background:#ff8c00; color:#fff; border:none; border-radius:10px; font-weight:900; margin-top:20px;">확인</button>
        </div>
    </div>

    <div class="wrapper">
        <div class="header" style="position: relative;">
            <div id="dark-mode-btn" onclick="toggleDarkMode()" style="position: absolute; top: 10px; left: 10px; width: 100px; padding: 6px; background-color: #34495e; color: white; border-radius: 15px; font-weight: 900; font-size: 11px; z-index: 10; margin-top: 25px;">🌙 다크모드</div>
            <div onclick="window.location.reload(true);" style="position: absolute; top: 10px; right: 10px; width: 90px; padding: 6px 0; text-align: center; background-color: #ff8c00; color: white; border-radius: 15px; font-weight: 900; font-size: 13px; z-index: 10;">🔄 새로고침</div>
            <img src="mlogo.jpg" class="logo-img">
            <div class="rocket-title">🚀 채번 요청 1초컷</div>
            <div class="sub-tag">천안1캠프 전용 스마트 시스템</div>
        </div>

        <div id="main-view" style="display:none;" class="main-card">
            <div class="info-box">
                <span class="user-info">현재 계정: <strong><span id="display-id"></span> <span id="display-camp"></span></strong></span>
                <button class="btn-change" onclick="showSetup()">정보 변경</button>
            </div>
            
            <form id="ryanForm" onsubmit="submitFinal(event)">
                <div class="label-area">📦<span>운송장 번호</span></div>
                <div class="input-group">
                    <input type="text" id="waybill" placeholder="우측 버튼을 누르세요 👉" required>
                    <button type="button" class="btn-paste" onclick="pasteClipboard()">👆 붙여넣기 클릭</button>
                </div>
                <div class="label-area">🔢<span>채번 수량</span></div>
                <input type="number" id="quantity" placeholder="숫자만 입력" required>
                <button type="submit" class="btn-submit" id="submitBtn">바로 제출하기</button>
            </form>

            <script>
                async function pasteClipboard() {
                    try {
                        const text = await navigator.clipboard.readText();
                        document.getElementById('waybill').value = text;
                    } catch (err) {
                        myAlert("🚫 직접 꾹 눌러서 붙여넣어주세요!");
                    }
                }

                function submitFinal(event) {
                    event.preventDefault();
                    var btn = document.getElementById('submitBtn');
                    btn.innerText = '전송 중... ⏳';
                    btn.disabled = true;

                    var idVal = document.getElementById('display-id').innerText;
                    var campVal = document.getElementById('display-camp').innerText;
                    var waybillVal = document.getElementById('waybill').value;
                    var quantityVal = document.getElementById('quantity').value;

                    // 🚨 [여기가 대표님 개인 구글 폼 주소입니다!] 🚨
                    var url = "https://docs.google.com/forms/d/e/1FAIpQLSfiEqOUQAo_pCMhh1q3E-_VYxAkDKp5kn8RqB3_mcHL6ksYeQ/formResponse";
                    
                    var params = new URLSearchParams();
                    params.append("pageHistory", "0,1"); 
                    params.append("entry.893130037", "채번 요청");
                    params.append("entry.442655354", idVal.trim());
                    params.append("entry.786194174", campVal.trim());
                    params.append("entry.633777622", waybillVal);
                    params.append("entry.1141746706", quantityVal);

                    fetch(url, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: params.toString()
                    });

                    setTimeout(function() {
                        if(typeof handleFormSuccess === 'function') {
                            handleFormSuccess(); // 히스토리 연동
                        }
                        btn.innerText = '바로 제출하기';
                        btn.disabled = false;
                    }, 500);
                }
            </script>
            
            <button type="button" onclick="showHistory()" style="width:100%; padding:12px; margin-top:15px; background:#2ecc71; color:white; border:none; border-radius:10px; font-weight:900; font-size:15px;">📋 채번 히스토리</button>
        </div>

        <div class="footer">
            © 2026 RyanL Logistics.<br>
            <span class="designer-tag">Created by LJH</span>
        </div>
    </div>
</body>
